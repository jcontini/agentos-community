id: xp
name: Windows XP
type: os
description: Windows XP Luna Blue — the iconic warm blue and beige desktop
family: windows
color-scheme: light

default_wallpaper: windows/bliss.jpg

credits:
  inspired_by:
    - name: Reborn XP
      url: https://xp.quenq.com/
      author: quenq
      note: Taskbar/tray gradients, start button images, tab styling, Bliss wallpaper
    - name: OnlineWinXP
      url: https://github.com/proxy-m/OnlineWinXP
      author: proxy-m
      note: Radial gradient buttons, title bar gradients, window frame approach
    - name: XP.css
      url: https://botoxparty.github.io/XP.css/
      author: Adam Hammad
    - name: RY-OS
      url: https://github.com/ryokun6/ryos
      author: Ryo Lu (Head of Design, Cursor)

chrome:
  titlebar_buttons: right
  titlebar_height: 28
  window_border: 4
  corner_radius: 8
  has_taskbar: true
  has_menubar: false

sounds:
  startup: sounds/startup.wav
  shutdown: sounds/shutdown.wav
  error: sounds/error.wav
  notify: sounds/notify.wav
  minimize: sounds/minimize.wav
  restore: sounds/restore.wav
  navigation: sounds/navigation.wav
  ding: sounds/ding.wav
