id: xp
name: Windows XP
type: os
description: Windows XP Luna Blue — the iconic warm blue and beige desktop
family: windows
color-scheme: light

default_wallpaper: windows/bliss.jpg

credits:
  inspired_by:
    - name: Reborn XP
      url: https://xp.quenq.com/
      author: quenq
      note: Taskbar/tray gradients, start button images, tab styling, Bliss wallpaper
    - name: OnlineWinXP
      url: https://github.com/proxy-m/OnlineWinXP
      author: proxy-m
      note: Radial gradient buttons, title bar gradients, window frame approach
    - name: XP.css
      url: https://botoxparty.github.io/XP.css/
      author: Adam Hammad
    - name: RY-OS
      url: https://github.com/ryokun6/ryos
      author: Ryo Lu (Head of Design, Cursor)
    - name: Windows XP High Resolution Icon Pack
      url: https://github.com/marchmountain/-Windows-XP-High-Resolution-Icon-Pack
      author: marchmountain
      license: CC0 (Public Domain)
      note: 1024x1024 PNG recreations of XP icons, resized to 48/32/16px
    - name: windows-ui-assets
      url: https://github.com/bartekl1/windows-ui-assets
      author: bartekl1
      note: Reference archive of Windows UI assets (icons, sounds, cursors)

chrome:
  titlebar_buttons: right
  titlebar_height: 28
  window_border: 4
  corner_radius: 8
  has_taskbar: true
  has_menubar: false

icons:
  # Name-based icon system: apps/shapes declare an icon name, theme maps to file.
  # Each icon has 3 sizes: -48 (desktop/explorer), -32 (toolbar), -16 (list view).
  # Source: marchmountain Windows XP High Resolution Icon Pack (CC0 Public Domain)
  # https://github.com/marchmountain/-Windows-XP-High-Resolution-Icon-Pack
  #
  # App icons
  files:           icons/my-computer       # My Computer / Files app
  graph:           icons/explorer          # Graph browser
  help:            icons/help              # Help and Support
  settings:        icons/settings          # Control Panel
  calendar:        icons/calendar          # Date and Time
  accounts:        icons/accounts          # User Accounts
  store:           icons/store             # Add New Programs
  #
  # Desktop icons
  my-computer:     icons/my-computer
  my-documents:    icons/my-documents
  recycle-bin:     icons/recycle-bin-empty
  recycle-bin-full: icons/recycle-bin-full
  network:         icons/network
  desktop:         icons/desktop
  #
  # Entity/shape icons — used in file browser, graph, detail views
  # folder/file from shell32.dll (bartekl1/windows-ui-assets), rest from marchmountain CC0
  folder:          icons/folder            # classic yellow closed folder (shell32 #4)
  folder-open:     icons/folder-open       # open folder (shell32 #5)
  file:            icons/file              # blank document (shell32 #1)
  volume:          icons/local-disk
  drive:           icons/local-disk
  email:           icons/email
  search:          icons/search
  shared-folder:   icons/shared-folder
  network-drive:   icons/network-drive
  network-folder:  icons/network-folder
  internet:        icons/internet
  dvd:             icons/dvd
  zip:             icons/zip-folder
  my-music:        icons/my-music
  my-pictures:     icons/my-pictures
  my-videos:       icons/my-videos

sounds:
  startup: sounds/startup.wav
  shutdown: sounds/shutdown.wav
  error: sounds/error.wav
  notify: sounds/notify.wav
  minimize: sounds/minimize.wav
  restore: sounds/restore.wav
  navigation: sounds/navigation.wav
  ding: sounds/ding.wav
