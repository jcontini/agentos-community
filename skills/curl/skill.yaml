id: curl
name: Curl
description: Simple URL fetching using curl (no API key needed)
color: "#333333"

website: https://curl.se

provides:
  - tool: web_read
    via: read_webpage

connections: {}

# ═══════════════════════════════════════════════════════════════════════════════
# ADAPTERS
# ═══════════════════════════════════════════════════════════════════════════════

adapters:
  webpage:
    id: .url
    name: '.title // .url'
    text: .content
    content_type: .content_type

# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  read_webpage:
    description: Fetch a URL using curl (simple, no JS rendering)
    returns: webpage
    params:
      url: { type: string, required: true, description: "URL to fetch" }
    python:
      module: ./curl.py
      function: read_webpage
      timeout: 35
