id: macos-security
name: macOS Security
description: >
  Audit macOS credentials, Keychain entries, and app tokens.
  Lists what OAuth tokens, API keys, and session credentials are stored on this machine,
  extracts specific tokens, identifies which apps have Google OAuth access, and scans
  macOS Internet Accounts (the OS-level connections that appear as "macOS" in Google's
  authorized apps list).
color: "#6B7280"

website: https://support.apple.com/guide/keychain-access

connections: {}

operations:
  audit:
    description: >
      Full inventory of non-Apple credentials stored on this Mac. Returns categorized
      entries: native OAuth tokens (e.g. Mimestream/Google), Electron Safe Storage keys,
      direct API keys, CLI tool tokens, Spark auth keys, and app session tokens.
    returns:
      category: string
      app: string
      account: string
      note: string
    python:
      module: ./macos_security.py
      function: cmd_audit
      timeout: 30

  get_token:
    description: >
      Extract a specific token value from the Keychain by service name and account.
      Returns the raw string value. For binary plist entries (e.g. Mimestream OAuth),
      returns the hex-encoded plist — use audit first to find service/account names.
    params:
      service: { type: string, required: true, description: "Keychain service name (svce), e.g. 'Mimestream: user@example.com'" }
      account: { type: string, required: true, description: "Keychain account name (acct), e.g. 'OAuth'" }
    returns:
      service: string
      account: string
      value: string
      format: string
      note: string
    python:
      module: ./macos_security.py
      function: cmd_get_token
      timeout: 10

  scan_google_oauth:
    description: >
      Scan all installed apps for Google OAuth client IDs embedded in their Info.plist.
      Searches /Applications, /Applications/Setapp, ~/Applications, and /System/Applications.
      Finds apps registered as Google OAuth providers via the reversed-client-ID URL scheme
      (e.g. BusyContacts, Strongbox, Mimestream). These are the apps that appear in
      Google's "Apps with access to your account" list as native desktop clients.
    returns:
      app: string
      install_path: string
      bundle_id: string
      version: string
      client_id: string
      url_scheme: string
      note: string
    python:
      module: ./macos_security.py
      function: cmd_scan_google_oauth
      timeout: 60

  scan_macos_accounts:
    description: >
      Scan macOS Internet Accounts (Account.framework) — the OS-level OAuth connections
      added via System Settings → Internet Accounts. This is what appears as "macOS" in
      Google's authorized apps list. Finds Google, Exchange, CardDAV, CalDAV accounts
      registered at the OS level (used by Calendar, Contacts, Mail, and third-party apps
      that delegate to the system account rather than storing their own tokens).
      Requires Full Disk Access granted to the calling app.
    returns:
      username: string
      account_type: string
      identifier: string
      note: string
    python:
      module: ./macos_security.py
      function: cmd_scan_macos_accounts
      timeout: 15

  list_electron_apps:
    description: >
      List all apps using the Electron Safe Storage pattern. Each of these apps
      stores a master encryption key in the Keychain that encrypts all locally
      stored credentials, cookies, and session data.
    returns:
      name: string
    python:
      module: ./macos_security.py
      function: cmd_list_electron_apps
      timeout: 15
