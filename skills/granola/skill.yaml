id: granola
name: Granola
description: Meeting transcripts, AI summaries, and Q&A conversations from Granola
color: "#2D6A4F"

website: https://granola.ai
privacy_url: https://granola.ai/privacy

provides:
  - tool: web_read
    via: get_meeting
    urls:
      - "app.granola.ai/docs/*"

connections:
  api:
    description: "Granola REST API — live data, requires network"
    base_url: "https://api.granola.ai"
    vars:
      token_file: "~/Library/Application Support/Granola/supabase.json"
  cache:
    description: "Local app cache — instant, offline, read-only"
    vars:
      cache_file: "~/Library/Application Support/Granola/cache-v6.json"

adapters:
  meeting:
    id: .id
    name: .title
    text: .summary_text
    url: .granola_url
    datePublished: .start
    end: .end
    location: .location
    calendar_link: .calendar_link
    creation_source: .creation_source
    valid_meeting: .valid_meeting
    organizer_email: .organizer_email
    organizer_name: .organizer_name
    attendees: .attendees

    transcribe:
      transcript:
        id: '(.id) + "_transcript"'
        name: '"Transcript: " + .title'
        content: .transcript_text
        content_role: '"transcript"'
        language: '"en"'
        source_type: '"realtime_asr"'
        segment_count: .segment_count
        duration_ms: .duration_ms

  conversation:
    id: .id
    name: .title
    text: 'if .messages then (.messages | map(.text) | join("\n\n")) else "" end'
    url: .notes_url
    # Last activity (same idea as imessage/claude conversation adapters)
    datePublished: .updated_at
    created_at: .created_at
    document_id: .document_id
    message_count: 'if .messages then (.messages | length) else null end'

operations:
  list_meetings:
    description: List recent meetings with metadata and attendees
    returns: meeting[]
    connection: [api, cache]
    params:
      limit: { type: integer, description: "Number of meetings to return" }
      page: { type: integer, default: 0, description: "Page number (0-indexed)" }
    python:
      module: ./granola.py
      function: op_list_meetings
      args:
        limit: '.params.limit // 20'
        page: '.params.page // 0'
        connection: '.connection'
      timeout: 30

  get_meeting:
    description: Get a meeting with full transcript, attendees, and AI summary
    returns: meeting
    connection: api
    params:
      id: { type: string, description: "Granola document ID (UUID) — optional if url is an app.granola.ai/docs/… link" }
      url: { type: string, description: "Granola meeting doc URL from the app (web_read)" }
    python:
      module: ./granola.py
      function: op_get_meeting
      args:
        id: 'if (.params.url // "") != "" then (.params.url | capture("/docs/(?<gid>[0-9a-fA-F-]{36})") | .gid) else .params.id end'
        connection: '.connection'
      timeout: 60

  list_conversations:
    description: List Q&A/AI chat threads linked to a meeting transcript
    returns: conversation[]
    connection: [api, cache]
    params:
      document_id: { type: string, required: true, description: "Meeting document ID (UUID)" }
    python:
      module: ./granola.py
      function: op_list_conversations
      args:
        document_id: .params.document_id
        connection: '.connection'
      timeout: 30

  get_conversation:
    description: Get a Q&A conversation with full message history
    returns: conversation
    connection: [api, cache]
    params:
      thread_id: { type: string, required: true, description: "Chat thread ID (UUID)" }
    python:
      module: ./granola.py
      function: op_get_conversation
      args:
        thread_id: .params.thread_id
        connection: '.connection'
      timeout: 30
