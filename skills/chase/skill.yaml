id: chase
name: Chase Bank
description: Chase Bank accounts, balances, and transactions — checking, savings, and credit cards
color: "#117ACA"
website: https://www.chase.com

connections:
  web:
    auth:
      type: cookies
      domain: ".chase.com"
      names: ["AMSESSION", "sessioncacheid", "auth-guid", "dps-pod-id", "x-auth-activity-info", "akaalb_secure_chase_com", "auth-site-info"]
      liveness:
        url: "https://secure.chase.com/svc/rl/accounts/l4/v1/app/data/list"
        expect_status: 200
      account:
        check: check_session
      login:
        account_prompt: "What is your Chase username?"
        phases:
          - name: navigate_to_login
            steps:
              - { action: goto, url: "https://secure.chase.com/web/auth/dashboard#/dashboard/overview" }
            returns_to_agent: |
              The Chase login page is open in the browser.
              Ask the user to log in (username, password, MFA). Tell them to let you know when they can see their accounts dashboard.

          - name: complete_login
            steps:
              - { action: wait, url_contains: "/dashboard" }
            returns_to_agent: |
              Login confirmed. Cookie provider matchmaking can extract `.chase.com`
              cookies on the next API call. If multiple cookie providers are
              installed, ask the user which browser/provider to use.
adapters:
  account:
    id: .accountId
    name: .name
    text: '(.type + " •••• " + .last4)'
    account_type: .type
    last4: .last4
    balance: .balance
    available: .available
    card_type: .cardType

  transaction:
    id: '(.accountId + ":" + (.postingDate // .date) + ":" + (.description // .details.description // "transaction") + ":" + (.amount | tostring))'
    name: .description
    account: .accountId
    posting_date: '.postingDate // .date'
    amount: .amount
    balance: .balance
    category: '.category // .categoryDescription'
    pending: '.pending // false'
    details: .details

# ==============================================================================
# OPERATIONS
# ==============================================================================

operations:
  check_session:
    description: >
      Verify Chase session cookies and identify the logged-in account holder.
      Returns the primary account ID and nickname from the accounts API.
    connection: web
    returns: account
    python:
      module: ./chase-api.py
      function: check_session
      params: true
      timeout: 20
    test:
      skip: true

  list_accounts:
    description: >
      List all Chase accounts with current balances.
      Returns checking, savings, and credit card accounts.
      Balance = current balance. Available = available to spend/credit available.
    returns: account[]
    python:
      module: ./chase-api.py
      function: get_accounts
      args:
        cookies: .auth.cookies
      timeout: 20

  list_transactions:
    description: >
      List recent transactions for a Chase checking or savings account (DDA accounts only).
      Returns transactions with date, description, signed amount (negative=debit), running balance, and category.
      Credit card transactions require a different endpoint (not yet implemented).
    params:
      account_id:
        type: string
        required: true
        description: "The accountId from account.list (e.g. 123456789)"
      limit:
        type: integer
        description: "Number of transactions to return (default: 30, max: 100)"
    returns: transaction[]
    python:
      module: ./chase-api.py
      function: get_transactions
      args:
        cookies: .auth.cookies
        account_id: .params.account_id
        limit: '.params.limit // 30'
      timeout: 20
