id: porkbun
name: Porkbun
description: Domain and DNS management via the Porkbun API
color: "#D62F53"

website: https://porkbun.com
privacy_url: https://porkbun.com/products/privacy

connections:
  api:
    base_url: "https://api.porkbun.com/api/json/v3"
    auth:
      type: api_key
      body:
        apikey: '.auth.key | split(":") | .[0]'
        secretapikey: '.auth.key | split(":") | .[1]'
    label: API key and secret
    help_url: https://porkbun.com/account/api

operations:
  list_domains:
    description: List all domains in your Porkbun account
    returns: domain[]
    connection: api
    python:
      module: ./porkbun.py
      function: list_domains

  list_dns_records:
    description: List all DNS records for a domain
    returns: dns_record[]
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name, for example example.com
    python:
      module: ./porkbun.py
      function: list_dns_records

  create_dns_record:
    description: Create a new DNS record for a domain
    returns: void
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      name:
        type: string
        description: Subdomain, omit or empty string for the apex
      type:
        type: string
        required: true
        description: A, AAAA, CNAME, MX, TXT, NS, or SRV
      content:
        type: string
        required: true
        description: Record value
      ttl:
        type: integer
        default: 600
        description: TTL in seconds
      prio:
        type: integer
        description: Priority, used for MX records
    python:
      module: ./porkbun.py
      function: create_dns_record

  update_dns_record:
    description: Update an existing DNS record
    returns: void
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      id:
        type: string
        required: true
        description: Porkbun DNS record ID
      name:
        type: string
        description: Subdomain, omit or empty string for the apex
      type:
        type: string
        required: true
        description: Record type
      content:
        type: string
        required: true
        description: Record value
      ttl:
        type: integer
        default: 600
        description: TTL in seconds
      prio:
        type: integer
        description: Priority, used for MX records
    python:
      module: ./porkbun.py
      function: update_dns_record

  delete_dns_record:
    description: Delete a DNS record from a domain
    returns: void
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      id:
        type: string
        required: true
        description: Porkbun DNS record ID
    python:
      module: ./porkbun.py
      function: delete_dns_record
