id: exa
name: Exa
description: Semantic web search and content extraction
color: "#1F40ED"

website: https://exa.ai
privacy_url: https://exa.ai/privacy
terms_url: https://exa.ai/terms

provides:
  - tool: web_search
    via: search
  - tool: web_read
    via: read_webpage

connections:
  api:
    base_url: "https://api.exa.ai"
    domain: exa.ai
    auth:
      type: api_key
      header: { x-api-key: .auth.key }
    label: API Key
    help_url: https://dashboard.exa.ai/api-keys

  dashboard:
    base_url: "https://dashboard.exa.ai"
    domain: exa.ai
    auth:
      type: cookies
      domain: ".exa.ai"
      names: ["next-auth.session-token"]
      check: check_session
      login:
        - email_code: true
        - sso: google
# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  # ─── Auth & dashboard ─────────────────────────────────────────────────────
  check_session:
    description: Verify Exa dashboard session and identify the logged-in account.
    connection: dashboard
    returns:
      authenticated: boolean
      identifier: string
      display: string
    python:
      module: ./exa.py
      function: check_session
      params: true
      timeout: 15
    test:
      skip: true

  send_login_code:
    description: "Send a 6-digit verification code to the email — call verify_login_code next"
    returns:
      status: string
      email: string
      hint: string
    connection: dashboard
    params:
      email: { type: string, required: true, description: "Email address to send the verification code to" }
    python:
      module: ./exa.py
      function: send_login_code
      args:
        email: .params.email
      timeout: 30

  verify_login_code:
    description: "Verify the 6-digit code and complete login — fully HTTPX, no browser needed"
    returns:
      status: string
      email: string
      team: string
      user_id: string
    connection: dashboard
    params:
      email: { type: string, required: true, description: "Email address used in send_login_code" }
      code: { type: string, required: true, description: "6-digit verification code from the email" }
    python:
      module: ./exa.py
      function: verify_login_code
      args:
        email: .params.email
        code: .params.code
      timeout: 30

  store_session_cookies:
    description: "Store session cookies — fallback for Google SSO login via Playwright"
    returns:
      status: string
      identifier: string
      domain: string
      user_id: string
      team: string
    connection: dashboard
    params:
      email: { type: string, required: true, description: "Email address of the authenticated user" }
      session_token: { type: string, required: true, description: "next-auth.session-token cookie value from Playwright" }
      cf_clearance: { type: string, description: "Cloudflare cf_clearance cookie value (optional)" }
    python:
      module: ./exa.py
      function: store_session_cookies
      args:
        email: .params.email
        session_token: .params.session_token
        cf_clearance: .params.cf_clearance
      timeout: 30

  get_api_keys:
    description: List API keys from the Exa dashboard — extracts and stores the first enabled key
    returns:
      api_keys: array
      count: integer
    connection: dashboard
    python:
      module: ./exa.py
      function: get_api_keys
      args:
        cookies: .auth.cookies
      timeout: 30

  get_teams:
    description: Get team info including rate limits, credits, and usage
    returns:
      teams: array
      count: integer
    connection: dashboard
    python:
      module: ./exa.py
      function: get_teams
      args:
        cookies: .auth.cookies
      timeout: 30

  create_api_key:
    description: Create a new API key on the Exa dashboard — full key value returned only at creation
    returns:
      status: string
      key_name: string
      domain: string
      masked_key: string
    connection: dashboard
    params:
      name: { type: string, description: "Name for the new key (default: agentOS)" }
    python:
      module: ./exa.py
      function: create_api_key
      args:
        cookies: .auth.cookies
        name: .params.name
      timeout: 30

  logout:
    description: Sign out of the Exa dashboard and invalidate the session
    returns:
      status: string
      hint: string
    connection: dashboard
    python:
      module: ./exa.py
      function: logout
      args:
        cookies: .auth.cookies
      timeout: 30

  # ─── Search & content ─────────────────────────────────────────────────────
  search:
    description: Search the web using neural/semantic search
    returns: result[]
    connection: api
    wraps_as: search
    web_url: '"https://exa.ai/search?q=" + (.params.query | @uri)'
    params:
      query: { type: string, required: true, description: "Search query" }
      limit: { type: integer, description: "Number of results" }
      category: { type: string, description: "Category of search (e.g. company, research paper, news, tweet, github)" }
      include_text: { type: boolean, description: "Include full text of the results (default: true)" }
    test:
      params:
        query: "agentOS personal AI"
        limit: 3
    python:
      module: ./exa.py
      function: search
      args:
        query: .params.query
        limit: .params.limit
        category: .params.category
        include_text: .params.include_text
        auth: .auth

  read_webpage:
    description: Extract full content from a URL
    returns: webpage
    connection: api
    web_url: .params.url
    params:
      url: { type: string, required: true, description: "URL to fetch" }
    test:
      params:
        url: "https://exa.ai"
    python:
      module: ./exa.py
      function: read_webpage
      args:
        url: .params.url
        auth: .auth
