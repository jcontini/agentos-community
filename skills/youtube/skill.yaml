id: youtube
name: YouTube
description: Get video metadata and transcripts using yt-dlp
color: "#FF0808"
website: https://youtube.com

provides:
  - tool: web_read
    via: transcript_video
    urls:
      - "youtube.com/*"
      - "youtu.be/*"
      - "music.youtube.com/*"

connections: {}

sources:
  images:
    - ytimg.com
    - ggpht.com
    - googleusercontent.com
  frames:
    - https://www.youtube.com
    - https://www.youtube-nocookie.com

operations:
  search_videos:
    description: Search YouTube videos by query (returns results sorted by relevance)
    returns: video[]
    web_url: "https://www.youtube.com/results?search_query=${PARAM_QUERY}"
    params:
      query:
        type: string
        required: true
        description: Search query
      limit:
        type: integer
        default: 50
        description: Number of results
    python:
      module: ./youtube.py
      function: search_videos

  search_recent_video:
    description: Search YouTube videos by query sorted by upload date (newest first)
    returns: video[]
    web_url: "https://www.youtube.com/results?search_query=${PARAM_QUERY}&sp=CAI"
    params:
      query:
        type: string
        required: true
        description: Search query
      limit:
        type: integer
        default: 50
        description: Number of results
    python:
      module: ./youtube.py
      function: search_recent_video

  list_videos:
    description: List videos from a YouTube channel or playlist
    returns: video[]
    web_url: .params.url
    handles_urls:
      - "youtube.com/@*"
      - "youtube.com/channel/*"
      - "youtube.com/c/*"
      - "youtube.com/playlist*"
    params:
      url:
        type: string
        required: true
        description: YouTube channel URL (e.g., youtube.com/@channelname) or playlist URL
      limit:
        type: integer
        default: 50
        description: Number of videos to return
    python:
      module: ./youtube.py
      function: list_videos

  get_video:
    description: Get video metadata (title, creator, thumbnail, duration)
    returns: video
    web_url: .params.url
    handles_urls:
      - "youtube.com/*"
      - "youtu.be/*"
      - "music.youtube.com/*"
    params:
      url:
        type: string
        required: true
        description: YouTube video URL
    python:
      module: ./youtube.py
      function: get_video

  transcript_video:
    description: |
      Get video transcript with optional timestamps.

      Formats:
      - "text" (default): Plain text transcript — best for AI summarization, search, Q&A
      - "segments": Timestamped segments with start_ms/end_ms — use when the user asks about specific moments (e.g., "when do they talk about X?" or "what happens at the 5 minute mark?")

      Always returns plain text in the transcript field. The segments format adds a transcript_segments array with timing data.
    returns: video
    web_url: .params.url
    params:
      url:
        type: string
        required: true
        description: YouTube video URL
      lang:
        type: string
        default: en
        description: Language code (e.g., en, es, fr)
      format:
        type: string
        default: text
        description: "Transcript format: 'text' for plain text (default), 'segments' for timestamped segments"
    python:
      module: ./youtube.py
      function: transcript_video

  get_channel:
    description: Get YouTube channel metadata (avatar, description, subscriber count)
    returns: channel
    handles_urls:
      - "youtube.com/@*"
      - "youtube.com/channel/*"
      - "youtube.com/c/*"
    params:
      url:
        type: string
        required: true
        description: YouTube channel URL
    python:
      module: ./youtube.py
      function: get_channel

  get_avatar_channel:
    description: Quick fetch of just the channel avatar URL (scrapes og:image from channel page, ~1s)
    returns: channel
    params:
      url:
        type: string
        required: true
        description: YouTube channel URL
    python:
      module: ./youtube.py
      function: get_avatar_channel

  list_posts:
    description: |
      List comments on a YouTube video.
      Returns comments as post entities with account attribution and threading.
      Top-level comments reply to the video's post entity. Replies reply to their parent comment.
      Use limit to control how many comments to fetch (default 50, can be slow for popular videos).
    returns: post[]
    web_url: .params.url
    params:
      url:
        type: string
        required: true
        description: YouTube video URL
      limit:
        type: integer
        default: 50
        description: Maximum number of comments to fetch
    python:
      module: ./youtube.py
      function: list_posts
