id: serpapi
name: SerpAPI
description: Google search results API — flights, hotels, web search, and more
color: "#0FA47F"

website: https://serpapi.com
privacy_url: https://serpapi.com/privacy
terms_url: https://serpapi.com/terms-and-conditions

provides:
  - tool: flight_search
    via: search_offers

connections:
  api:
    base_url: "https://serpapi.com"
    auth:
      type: api_key
      query:
        api_key: .auth.key
    label: API Key
    help_url: https://serpapi.com/manage-api-key

# ═══════════════════════════════════════════════════════════════════════════════
# ADAPTERS
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  search_offers:
    description: Search Google Flights for flight offers between airports
    returns: offer[]
    connection: api
    params:
      departure_id:
        type: string
        required: true
        description: "Departure airport IATA code(s), comma-separated (e.g. 'AUS' or 'CDG,ORY')"
      arrival_id:
        type: string
        required: true
        description: "Arrival airport IATA code(s), comma-separated (e.g. 'JFK' or 'LHR,LGW')"
      outbound_date:
        type: string
        required: true
        description: "Outbound date (YYYY-MM-DD)"
      return_date:
        type: string
        description: "Return date (YYYY-MM-DD). Required for round trip."
      type:
        type: integer
        default: 1
        description: "Flight type: 1=Round trip (default), 2=One way, 3=Multi-city"
      travel_class:
        type: integer
        default: 1
        description: "1=Economy (default), 2=Premium economy, 3=Business, 4=First"
      adults:
        type: integer
        default: 1
        description: "Number of adult passengers"
      children:
        type: integer
        description: "Number of children"
      stops:
        type: integer
        description: "0=Any (default), 1=Nonstop, 2=1 stop or fewer, 3=2 stops or fewer"
      max_price:
        type: integer
        description: "Maximum ticket price in USD"
      sort_by:
        type: integer
        description: "1=Top flights (default), 2=Price, 3=Departure, 4=Arrival, 5=Duration, 6=Emissions"
      include_airlines:
        type: string
        description: "Airline IATA codes to include, comma-separated (e.g. 'UA,AA')"
      exclude_airlines:
        type: string
        description: "Airline IATA codes to exclude, comma-separated"
      currency:
        type: string
        default: USD
        description: "Currency code (ISO 4217)"
      hl:
        type: string
        default: en
        description: "Language code"
      gl:
        type: string
        description: "Country code for localization (e.g. 'us', 'uk')"
      deep_search:
        type: boolean
        description: "true for browser-identical results (slower)"
    python:
      module: ./serpapi.py
      function: search_offers

  list_offers:
    description: Get the best/recommended flight offers (may not always be available)
    returns: offer[]
    connection: api
    params:
      departure_id:
        type: string
        required: true
        description: "Departure airport IATA code(s)"
      arrival_id:
        type: string
        required: true
        description: "Arrival airport IATA code(s)"
      outbound_date:
        type: string
        required: true
        description: "Outbound date (YYYY-MM-DD)"
      return_date:
        type: string
        description: "Return date (YYYY-MM-DD)"
      type:
        type: integer
        default: 1
        description: "1=Round trip, 2=One way"
      travel_class:
        type: integer
        default: 1
        description: "1=Economy, 2=Premium economy, 3=Business, 4=First"
      currency:
        type: string
        default: USD
        description: "Currency code"
      hl:
        type: string
        default: en
        description: "Language code"
    python:
      module: ./serpapi.py
      function: list_offers

  get_offer:
    description: Get return flight offers using a departure token from a previous search
    returns: offer[]
    connection: api
    params:
      departure_token:
        type: string
        required: true
        description: "Departure token from a flight offer search result"
      currency:
        type: string
        default: USD
        description: "Currency code"
      hl:
        type: string
        default: en
        description: "Language code"
    python:
      module: ./serpapi.py
      function: get_offer

  get_booking_options:
    description: Get booking options for selected flights using a booking token
    connection: api
    params:
      booking_token:
        type: string
        required: true
        description: "Booking token from a flight offer result"
      currency:
        type: string
        default: USD
        description: "Currency code"
      hl:
        type: string
        default: en
        description: "Language code"
    returns:
      booking_options: array
      price: number
    python:
      module: ./serpapi.py
      function: get_booking_options

  get_price_insights:
    description: Get price insights for a flight route (typical price range, price level, history)
    connection: api
    params:
      departure_id:
        type: string
        required: true
        description: "Departure airport IATA code"
      arrival_id:
        type: string
        required: true
        description: "Arrival airport IATA code"
      outbound_date:
        type: string
        required: true
        description: "Outbound date (YYYY-MM-DD)"
      return_date:
        type: string
        description: "Return date (YYYY-MM-DD)"
      type:
        type: integer
        default: 1
        description: "1=Round trip, 2=One way"
      currency:
        type: string
        default: USD
        description: "Currency code"
    returns:
      lowest_price: number
      price_level: string
      typical_price_range: array
      price_history: array
    python:
      module: ./serpapi.py
      function: get_price_insights
