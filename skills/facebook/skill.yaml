id: facebook
name: Facebook
description: Query public Facebook group information without login
color: "#106BFF"

website: https://facebook.com
privacy_url: https://www.facebook.com/privacy/policy
terms_url: https://www.facebook.com/legal/terms

connections: {}

provides:
  - tool: web_read
    via: get_community
    urls:
      - "facebook.com/groups/*"
      - "www.facebook.com/groups/*"

# ═══════════════════════════════════════════════════════════════════════════════
# ADAPTERS
# ═══════════════════════════════════════════════════════════════════════════════

adapters:
  community:
    id: .id
    name: .name
    text: .description
    url: .url
    image: .icon
    member_count: .member_count_numeric
    privacy: .privacy

# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  get_community:
    description: Get metadata for a public Facebook group
    returns: community
    params:
      group:
        type: string
        description: "Group slug or name (e.g. becomingaportuguesecitizen) — optional if url is set"
      url:
        type: string
        description: "Full Facebook group URL (web_read) — optional if group is set"
      include_members:
        type: boolean
        default: true
        description: "Include member count (requires Chromium, slower ~2-3s)"
    command:
      binary: bash
      args:
        - ./get_community.sh
        - 'if (.params.url // "") != "" then .params.url elif (.params.group // "") != "" then .params.group else "" end'
        - ".params.include_members"
      timeout: 35
