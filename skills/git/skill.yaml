id: git
name: Git
description: Local git repository data — commits, branches, tags, and repo info
color: "#F05032"

website: https://git-scm.com

connections: {}

operations:
  list_git_commits:
    description: List recent commits in a git repository. Returns commits newest first with diff stats.
    returns: git_commit[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      limit:
        type: integer
        default: 100
        description: Max commits to return (default 100)
      branch:
        type: string
        description: Branch to list commits from (default current branch)
      author:
        type: string
        description: Filter by author name or email
    python:
      module: ./git.py
      function: list_git_commits

  get_git_commit:
    description: Get a single commit with full details and diff stats.
    returns: git_commit
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      id:
        type: string
        required: true
        description: Commit hash (full or abbreviated)
    python:
      module: ./git.py
      function: get_git_commit

  search_git_commits:
    description: Search commit messages by keyword.
    returns: git_commit[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      query:
        type: string
        required: true
        description: Search term to match in commit messages
      limit:
        type: integer
        default: 100
        description: Max results (default 100)
    python:
      module: ./git.py
      function: search_git_commits

  list_branches:
    description: List all branches (local and remote) in a repository.
    returns: branch[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    python:
      module: ./git.py
      function: list_branches

  get_branch:
    description: Get info about a specific branch.
    returns: branch
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      name:
        type: string
        required: true
        description: Branch name
    python:
      module: ./git.py
      function: get_branch

  get_repository:
    description: Get repository info from the local git repo — remote URL, platform, branch.
    returns: repository
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    python:
      module: ./git.py
      function: get_repository

  list_tags:
    description: List all tags in the repository.
    returns: tag[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    python:
      module: ./git.py
      function: list_tags

  get_tag:
    description: Get info about a specific tag.
    returns: tag
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      name:
        type: string
        required: true
        description: Tag name
    python:
      module: ./git.py
      function: get_tag

# Additional operations that return live custom shapes.
  status:
    description: Show working tree status — modified, staged, and untracked files. Returns live state, not stored data.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    python:
      module: ./git.py
      function: status

  diff:
    description: Show the diff of working tree changes, staged changes, or between two refs.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      staged:
        type: boolean
        description: Show staged changes only (default false)
      ref1:
        type: string
        description: First ref to compare (e.g., HEAD~3, main)
      ref2:
        type: string
        description: Second ref to compare (e.g., HEAD, feature-branch)
    python:
      module: ./git.py
      function: diff

  log:
    description: Raw git log output with flexible formatting. Use commit.list for structured data.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      format:
        type: string
        description: Git log format string (default oneline)
      limit:
        type: integer
        default: 100
        description: Max entries (default 100)
      branch:
        type: string
        description: Branch to show log for
    python:
      module: ./git.py
      function: log
