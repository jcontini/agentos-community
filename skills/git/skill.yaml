id: git
name: Git
description: Local git repository data — commits, branches, tags, and repo info
icon: icon.svg
color: "#F05032"

website: https://git-scm.com

connections: {}

adapters:
  git_commit:
    id: .hash
    name: .message
    content: .message
    hash: .hash
    short_hash: .short_hash
    timestamp: .timestamp
    author_name: .author_name
    author_email: .author_email
    committer_name: .committer_name
    committer_email: .committer_email
    files_changed: .files_changed
    insertions: .insertions
    deletions: .deletions
    sender:
      person:
        name: .author_name
        email: .author_email

  branch:
    id: .name
    name: .name
    is_remote: .is_remote
    upstream: .upstream

  repository:
    id: .full_name
    name: .name
    full_name: .full_name
    url: .url
    platform: .platform
    default_branch: .default_branch

  tag:
    id: .name
    name: .name
    data.hash: .hash
    data.date: .date
    data.message: .message
    data.annotated: .annotated

operations:
  list_git_commits:
    description: List recent commits in a git repository. Returns commits newest first with diff stats.
    returns: git_commit[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      limit:
        type: integer
        default: 100
        description: Max commits to return (default 100)
      branch:
        type: string
        description: Branch to list commits from (default current branch)
      author:
        type: string
        description: Filter by author name or email
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_BRANCH="$2"; PARAM_AUTHOR="$3"; PARAM_LIMIT="$4"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          BRANCH="${PARAM_BRANCH}"
          AUTHOR="${PARAM_AUTHOR}"
          git log ${BRANCH:+"$BRANCH"} ${AUTHOR:+--author="$AUTHOR"} -${PARAM_LIMIT} --pretty=format:'COMMIT_START%n{"hash":"%H","short_hash":"%h","author_name":"%an","author_email":"%ae","committer_name":"%cn","committer_email":"%ce","timestamp":"%aI","message":"%s"}' --shortstat 2>/dev/null | awk '
          /^COMMIT_START/ { if (json) print json; json=""; next }
          /^\{/ { json=$0; next }
          /^ [0-9]/ {
            files=0; ins=0; del=0
            for(i=1;i<=NF;i++) {
              if($(i+1) ~ /file/) files=$i
              if($(i+1) ~ /insertion/) ins=$i
              if($(i+1) ~ /deletion/) del=$i
            }
            sub(/\}$/, ",\"files_changed\":"files",\"insertions\":"ins",\"deletions\":"del"}", json)
          }
          END { if (json) print json }
          ' | jq -s '.'
        - "--"
        - ".params.path"
        - ".params.branch"
        - ".params.author"
        - ".params.limit"
      timeout: 30

  get_git_commit:
    description: Get a single commit with full details and diff stats.
    returns: git_commit
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      id:
        type: string
        required: true
        description: Commit hash (full or abbreviated)
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_ID="$2"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git show "${PARAM_ID}" --pretty=format:'{"hash":"%H","short_hash":"%h","author_name":"%an","author_email":"%ae","committer_name":"%cn","committer_email":"%ce","timestamp":"%aI","message":"%s"}' --shortstat 2>/dev/null | awk '
          /^\{/ { json=$0; next }
          /^ [0-9]/ {
            files=0; ins=0; del=0
            for(i=1;i<=NF;i++) {
              if($(i+1) ~ /file/) files=$i
              if($(i+1) ~ /insertion/) ins=$i
              if($(i+1) ~ /deletion/) del=$i
            }
            sub(/\}$/, ",\"files_changed\":"files",\"insertions\":"ins",\"deletions\":"del"}", json)
          }
          END { if (json) print json }
          '
        - "--"
        - ".params.path"
        - ".params.id"
      timeout: 30

  search_git_commits:
    description: Search commit messages by keyword.
    returns: git_commit[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      query:
        type: string
        required: true
        description: Search term to match in commit messages
      limit:
        type: integer
        default: 100
        description: Max results (default 100)
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_QUERY="$2"; PARAM_LIMIT="$3"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git log --grep="${PARAM_QUERY}" -i -${PARAM_LIMIT} --pretty=format:'COMMIT_START%n{"hash":"%H","short_hash":"%h","author_name":"%an","author_email":"%ae","committer_name":"%cn","committer_email":"%ce","timestamp":"%aI","message":"%s"}' --shortstat 2>/dev/null | awk '
          /^COMMIT_START/ { if (json) print json; json=""; next }
          /^\{/ { json=$0; next }
          /^ [0-9]/ {
            files=0; ins=0; del=0
            for(i=1;i<=NF;i++) {
              if($(i+1) ~ /file/) files=$i
              if($(i+1) ~ /insertion/) ins=$i
              if($(i+1) ~ /deletion/) del=$i
            }
            sub(/\}$/, ",\"files_changed\":"files",\"insertions\":"ins",\"deletions\":"del"}", json)
          }
          END { if (json) print json }
          ' | jq -s '.'
        - "--"
        - ".params.path"
        - ".params.query"
        - ".params.limit"
      timeout: 30

  list_branches:
    description: List all branches (local and remote) in a repository.
    returns: branch[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git branch -a --format='%(refname:short)|%(upstream:short)|%(HEAD)' 2>/dev/null | while IFS='|' read name upstream head; do
            is_remote=false
            [[ "$name" == origin/* ]] && is_remote=true
            is_current=false
            [[ "$head" == "*" ]] && is_current=true
            printf '{"name":"%s","upstream":"%s","is_remote":%s,"is_current":%s}\n' "$name" "$upstream" "$is_remote" "$is_current"
          done | jq -s '.'
        - "--"
        - ".params.path"
      timeout: 15

  get_branch:
    description: Get info about a specific branch.
    returns: branch
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      name:
        type: string
        required: true
        description: Branch name
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_NAME="$2"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git branch -a --format='%(refname:short)|%(upstream:short)|%(HEAD)' 2>/dev/null | grep "^${PARAM_NAME}|" | head -1 | {
            IFS='|' read name upstream head
            is_remote=false
            [[ "$name" == origin/* ]] && is_remote=true
            is_current=false
            [[ "$head" == "*" ]] && is_current=true
            printf '{"name":"%s","upstream":"%s","is_remote":%s,"is_current":%s}\n' "$name" "$upstream" "$is_remote" "$is_current"
          }
        - "--"
        - ".params.path"
        - ".params.name"
      timeout: 15

  get_repository:
    description: Get repository info from the local git repo — remote URL, platform, branch.
    returns: repository
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git_remote=$(git remote get-url origin 2>/dev/null || echo "")
          git_branch=$(git branch --show-current 2>/dev/null || echo "")
          repo_name=$(basename "$(git rev-parse --show-toplevel 2>/dev/null)")
          full_name=$(echo "$git_remote" | sed -E 's#.*[:/]([^/]+/[^/.]+).*#\1#')
          platform="local"
          [[ "$git_remote" == *github.com* ]] && platform="github"
          [[ "$git_remote" == *gitlab.com* ]] && platform="gitlab"
          [[ "$git_remote" == *bitbucket.org* ]] && platform="bitbucket"
          [[ "$git_remote" == *codeberg.org* ]] && platform="codeberg"
          printf '{"name":"%s","full_name":"%s","url":"%s","platform":"%s","default_branch":"%s"}\n' \
            "$repo_name" "$full_name" "$git_remote" "$platform" "$git_branch"
        - "--"
        - ".params.path"
      timeout: 15

  list_tags:
    description: List all tags in the repository.
    returns: tag[]
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git tag -l --format='%(refname:short)|%(objectname:short)|%(creatordate:iso-strict)|%(subject)|%(objecttype)' 2>/dev/null | while IFS='|' read name hash date message objtype; do
            annotated=false
            [[ "$objtype" == "tag" ]] && annotated=true
            printf '{"name":"%s","hash":"%s","date":"%s","message":"%s","annotated":%s}\n' \
              "$name" "$hash" "$date" "$message" "$annotated"
          done | jq -s '.'
        - "--"
        - ".params.path"
      timeout: 15

  get_tag:
    description: Get info about a specific tag.
    returns: tag
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      name:
        type: string
        required: true
        description: Tag name
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_NAME="$2"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          git tag -l "${PARAM_NAME}" --format='%(refname:short)|%(objectname:short)|%(creatordate:iso-strict)|%(subject)|%(objecttype)' 2>/dev/null | head -1 | {
            IFS='|' read name hash date message objtype
            annotated=false
            [[ "$objtype" == "tag" ]] && annotated=true
            printf '{"name":"%s","hash":"%s","date":"%s","message":"%s","annotated":%s}\n' \
              "$name" "$hash" "$date" "$message" "$annotated"
          }
        - "--"
        - ".params.path"
        - ".params.name"
      timeout: 15

# Additional operations that return live custom shapes.
  status:
    description: Show working tree status — modified, staged, and untracked files. Returns live state, not stored data.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          branch=$(git branch --show-current 2>/dev/null)
          tracking=$(git rev-parse --abbrev-ref @{u} 2>/dev/null || echo "")
          ahead=0; behind=0
          if [ -n "$tracking" ]; then
            ahead=$(git rev-list --count "$tracking..HEAD" 2>/dev/null || echo 0)
            behind=$(git rev-list --count "HEAD..$tracking" 2>/dev/null || echo 0)
          fi
          staged=$(git diff --cached --name-only 2>/dev/null | wc -l | tr -d ' ')
          modified=$(git diff --name-only 2>/dev/null | wc -l | tr -d ' ')
          untracked=$(git ls-files --others --exclude-standard 2>/dev/null | wc -l | tr -d ' ')
          printf '{"branch":"%s","tracking":"%s","ahead":%d,"behind":%d,"staged":%d,"modified":%d,"untracked":%d}\n' \
            "$branch" "$tracking" "$ahead" "$behind" "$staged" "$modified" "$untracked"
        - "--"
        - ".params.path"
      timeout: 15

  diff:
    description: Show the diff of working tree changes, staged changes, or between two refs.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      staged:
        type: boolean
        description: Show staged changes only (default false)
      ref1:
        type: string
        description: First ref to compare (e.g., HEAD~3, main)
      ref2:
        type: string
        description: Second ref to compare (e.g., HEAD, feature-branch)
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_REF1="$2"; PARAM_REF2="$3"; PARAM_STAGED="$4"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          REF1="${PARAM_REF1}"
          REF2="${PARAM_REF2}"
          STAGED="${PARAM_STAGED}"
          if [ -n "$REF1" ]; then
            git diff "$REF1" ${REF2:+"$REF2"} 2>/dev/null
          elif [ "$STAGED" = "true" ]; then
            git diff --cached 2>/dev/null
          else
            git diff 2>/dev/null
          fi
        - "--"
        - ".params.path"
        - ".params.ref1"
        - ".params.ref2"
        - ".params.staged"
      timeout: 30

  log:
    description: Raw git log output with flexible formatting. Use commit.list for structured data.
    returns: string
    params:
      path:
        type: string
        required: true
        description: Absolute path to the git repository
      format:
        type: string
        description: Git log format string (default oneline)
      limit:
        type: integer
        default: 100
        description: Max entries (default 100)
      branch:
        type: string
        description: Branch to show log for
    command:
      binary: bash
      args:
        - "-c"
        - |
          PARAM_PATH="$1"; PARAM_BRANCH="$2"; PARAM_FORMAT="$3"; PARAM_LIMIT="$4"
          cd "${PARAM_PATH}" 2>/dev/null || exit 1
          BRANCH="${PARAM_BRANCH}"
          FORMAT="${PARAM_FORMAT}"
          git log ${BRANCH:+"$BRANCH"} -${PARAM_LIMIT} --format="${FORMAT:-oneline}" 2>/dev/null
        - "--"
        - ".params.path"
        - ".params.branch"
        - ".params.format"
        - ".params.limit"
      timeout: 30
