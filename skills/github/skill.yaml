id: github
name: GitHub
description: Work with GitHub issues, pull requests, and repository files through the local gh CLI. Use when working with GitHub repos, issues, PRs, or reading files from a repo.
color: "#24292F"
website: https://github.com

connections: {}

provides:
  - tool: web_read
    via: get_task
    urls:
      - "github.com/*/issues/*"
      - "github.com/*/pull/*"
  - tool: web_read
    via: read_document
    urls:
      - "github.com/*/blob/*"
      - "raw.githubusercontent.com/*"

adapters:
  task:
    id: '.number | tostring'
    name: .title
    text: '.body // null'
    url: .url
    datePublished: .created_at
    updated_at: .updated_at
    completed_at: '.closed_at // null'
    data.state: .state
    data.repository: '.repository // null'
    data.author: '.author // null'
    data.labels: '.labels // []'

  document:
    id: '.sha // .path'
    name: .name
    url: '.url // null'
    content: '.content // null'
    data.path: .path
    data.kind: '.kind // null'
    data.sha: '.sha // null'
    data.size: '.size // null'
    data.repository: '.repository // null'

operations:
  list_tasks:
    description: List issues for a repository
    returns: task[]
    params:
      repo:
        type: string
        required: true
        description: Repository in owner/name format
      state:
        type: string
        description: open, closed, or all
      limit:
        type: integer
        description: Maximum number of issues to return
    python:
      module: ./github-cli.py
      function: list_tasks
      params: true
      timeout: 30

  get_task:
    description: Get a single issue by number
    returns: task
    params:
      repo:
        type: string
        description: Repository in owner/name format — optional if url is a GitHub issue or PR link
      number:
        type: integer
        description: Issue or PR number — optional if url is set
      url:
        type: string
        description: GitHub issue or pull request URL (web_read)
    python:
      module: ./github-cli.py
      function: get_task
      params: true
      timeout: 30

  create_task:
    description: Create a new GitHub issue
    returns:
      url: string
      number: integer
      title: string
    params:
      repo:
        type: string
        required: true
        description: Repository in owner/name format
      title:
        type: string
        required: true
        description: Issue title
      body:
        type: string
        description: Issue body
    python:
      module: ./github-cli.py
      function: create_task
      params: true
      timeout: 30

  close_task:
    description: Close an issue
    returns:
      ok: boolean
      url: string
    params:
      repo:
        type: string
        required: true
      number:
        type: integer
        required: true
        description: Issue number
    python:
      module: ./github-cli.py
      function: close_task
      params: true
      timeout: 30

  reopen_task:
    description: Reopen a closed issue
    returns:
      ok: boolean
      url: string
    params:
      repo:
        type: string
        required: true
      number:
        type: integer
        required: true
        description: Issue number
    python:
      module: ./github-cli.py
      function: reopen_task
      params: true
      timeout: 30

  list_pull_requests:
    description: List pull requests for a repository
    returns: array
    params:
      repo:
        type: string
        required: true
        description: Repository in owner/name format
      state:
        type: string
        description: open, closed, or all
      limit:
        type: integer
        description: Maximum number of pull requests to return
    python:
      module: ./github-cli.py
      function: list_pull_requests
      params: true
      timeout: 30

  create_pull_request:
    description: Create a pull request
    returns:
      url: string
    params:
      repo:
        type: string
        required: true
        description: Repository in owner/name format
      title:
        type: string
        required: true
        description: Pull request title
      body:
        type: string
        description: Pull request body
      head:
        type: string
        required: true
        description: Source branch
      base:
        type: string
        description: Target branch
    python:
      module: ./github-cli.py
      function: create_pull_request
      params: true
      timeout: 30

  list_documents:
    description: List files and folders at a repository path
    returns: document[]
    params:
      repo:
        type: string
        required: true
        description: Repository in owner/name format
      path:
        type: string
        description: Path within the repository
      ref:
        type: string
        description: Branch, tag, or commit
    python:
      module: ./github-cli.py
      function: list_documents
      params: true
      timeout: 30

  read_document:
    description: Read a text file from a repository
    returns: document
    params:
      repo:
        type: string
        description: Repository in owner/name format — optional if url is a blob or raw.githubusercontent.com link
      path:
        type: string
        description: File path within the repository — optional if url is set
      ref:
        type: string
        description: Branch, tag, or commit — optional if url is set
      url:
        type: string
        description: GitHub blob URL or raw.githubusercontent.com file URL (web_read)
    python:
      module: ./github-cli.py
      function: read_document
      params: true
      timeout: 30

  status:
    description: Show GitHub CLI status for the current machine
    returns:
      output: string
    python:
      module: ./github-cli.py
      function: status
      params: true
      timeout: 30
