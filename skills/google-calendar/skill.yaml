id: google-calendar
name: Google Calendar
description: Read, create, update, and delete Google Calendar events — replaces apple-calendar with Google API + OAuth
color: "#4285F4"

website: https://calendar.google.com
privacy_url: https://policies.google.com/privacy

connections:
  api:
    base_url: "https://www.googleapis.com/calendar/v3"
    auth:
      type: oauth
      service: google
      scopes:
        - https://www.googleapis.com/auth/calendar.events

provides:
  - tool: web_read
    via: get_event
    urls:
      - "calendar.google.com/*"

# ==============================================================================
# OPERATIONS
# ==============================================================================

operations:

  # --- Reading ---

  list_calendars:
    description: List all calendars the user can see (name, color, timezone, access role)
    returns: calendar[]
    connection: api
    params:
      account: { type: string, description: "Google account email" }
    python:
      module: ./gcal.py
      function: list_calendars
      timeout: 15

  list_events:
    description: "List calendar events within a date range, optionally filtered by search query. Expands recurring events into individual instances."
    returns: event[]
    connection: api
    params:
      account: { type: string, description: "Google account email" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
      days: { type: integer, description: "Days from now (default: 7, max: 30)" }
      past: { type: boolean, description: "Look backward instead of forward (default: false)" }
      query: { type: string, description: "Free-text search across title, description, location, attendees" }
      limit: { type: integer, description: "Max results (default: 50)" }
      page_token: { type: string, description: "Pagination token from previous response" }
      exclude_all_day: { type: boolean, description: "Exclude all-day events (default: false)" }
    python:
      module: ./gcal.py
      function: list_events
      timeout: 30

  get_event:
    description: Get full details of a specific calendar event
    returns: event
    connection: api
    params:
      id: { type: string, description: "Event ID — optional if url is a calendar.google.com link" }
      url: { type: string, description: "Google Calendar web URL (web_read); extracts event ID from eid param" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
      account: { type: string, description: "Google account email" }
    python:
      module: ./gcal.py
      function: get_event
      timeout: 15

  search_events:
    description: "Search events across all calendars by free-text query (title, description, location, attendees)"
    returns: event[]
    connection: api
    params:
      query: { type: string, required: true, description: "Search text" }
      account: { type: string, description: "Google account email" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
      days: { type: integer, description: "Days from now to search (default: 30)" }
      past: { type: boolean, description: "Search backward (default: false)" }
      limit: { type: integer, description: "Max results (default: 25)" }
    python:
      module: ./gcal.py
      function: search_events
      timeout: 30

  # --- Writing ---

  create_event:
    description: Create a new calendar event with optional attendees, location, and recurrence
    returns: event
    connection: api
    params:
      account: { type: string, description: "Google account email" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
      title: { type: string, required: true, description: "Event title" }
      start: { type: string, required: true, description: "Start time — ISO 8601 datetime (2026-03-28T14:00:00) or YYYY-MM-DD for all-day" }
      end: { type: string, description: "End time (defaults to 1 hour after start for timed events, or next day for all-day)" }
      all_day: { type: boolean, description: "Create as all-day event" }
      location: { type: string, description: "Event location" }
      description: { type: string, description: "Event description/notes" }
      attendees: { type: array, description: "List of attendee email addresses" }
      recurrence: { type: array, description: "RRULE strings, e.g. ['RRULE:FREQ=WEEKLY;BYDAY=MO']" }
      timezone: { type: string, description: "IANA timezone (e.g. America/Chicago). Defaults to calendar timezone." }
    python:
      module: ./gcal.py
      function: create_event
      timeout: 15

  update_event:
    description: Update an existing calendar event (partial update — only provided fields change)
    returns: event
    connection: api
    params:
      id: { type: string, required: true, description: "Event ID" }
      account: { type: string, description: "Google account email" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
      title: { type: string, description: "New title" }
      start: { type: string, description: "New start time (ISO 8601 or YYYY-MM-DD)" }
      end: { type: string, description: "New end time" }
      location: { type: string, description: "New location" }
      description: { type: string, description: "New description" }
      attendees: { type: array, description: "New attendee list (replaces existing)" }
    python:
      module: ./gcal.py
      function: update_event
      timeout: 15

  delete_event:
    description: Delete a calendar event (moves to trash)
    returns: void
    connection: api
    params:
      id: { type: string, required: true, description: "Event ID" }
      account: { type: string, description: "Google account email" }
      calendar_id: { type: string, description: "Calendar ID (default: 'primary')" }
    python:
      module: ./gcal.py
      function: delete_event
      timeout: 15
