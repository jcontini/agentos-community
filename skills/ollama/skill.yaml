id: ollama
name: Ollama
description: Local AI models running on your machine via Ollama
color: "#0F172A"
website: https://ollama.com
privacy_url: https://ollama.com/privacy

connections:
  api:
    description: "Ollama REST API — fast inference path, requires server to be running"
    base_url: "http://localhost:11434"
  cli:
    description: "Ollama CLI — can start the server, pull/delete models, management ops"
    vars:
      binary: "/opt/homebrew/bin/ollama"

operations:

  # ── Server management ──────────────────────────────────────────────────────

  status:
    description: >
      Check if the Ollama server is running at localhost:11434. If not running,
      starts it automatically via the CLI binary. Returns version, running state,
      and whether it was just started.
    returns:
      running: { type: boolean }
      version: { type: string }
      started: { type: boolean }
      message: { type: string }
    connection: cli
    python:
      module: ./ollama.py
      function: op_status
      timeout: 30

  # ── Inference ──────────────────────────────────────────────────────────────

  chat:
    description: >
      Send a chat message to a local Ollama model. Supports tool calling, system
      prompts, and extended thinking mode. Uses the REST API by default; falls back
      to the CLI for single-turn prompts if the API connection is chosen as cli.
      Auto-starts the Ollama server if it is not running.
    returns:
      content: { type: string, description: "Text response (null if tool calls only)" }
      thinking: { type: string, description: "Reasoning trace (only for thinking models)" }
      tool_calls: { type: array, description: "Tool calls the model wants to make" }
      stop_reason: { type: string, enum: [end_turn, tool_use, max_tokens] }
      usage: { type: object, description: "Token counts: input_tokens, output_tokens" }
    connection: [api, cli]
    params:
      model:
        type: string
        required: true
        description: "Model name (e.g. qwen3.5:9b-q8_0, glm-4.7-flash)"
      messages:
        type: array
        required: true
        description: "Array of {role, content} message objects"
      tools:
        type: array
        description: "Optional tool definitions ({name, description, input_schema})"
      system:
        type: string
        description: "Optional system prompt (prepended as first message)"
      max_tokens:
        type: integer
        default: 4096
        description: "Maximum tokens to generate"
      temperature:
        type: number
        default: 0
        description: "Sampling temperature (0 = deterministic, good for agents)"
      thinking:
        type: boolean
        default: false
        description: "Enable extended thinking / reasoning mode (qwen3, glm-4.7, etc.)"
    python:
      module: ./ollama.py
      function: op_chat
      timeout: 300

  generate:
    description: >
      One-shot text generation — no chat history, faster for simple single-turn
      prompts. Returns the raw response text and token counts.
    returns:
      response: { type: string }
      usage: { type: object, description: "input_tokens, output_tokens" }
    connection: api
    params:
      model:
        type: string
        required: true
      prompt:
        type: string
        required: true
      system:
        type: string
        description: "Optional system context"
      max_tokens:
        type: integer
        default: 4096
      temperature:
        type: number
        default: 0
    python:
      module: ./ollama.py
      function: op_generate
      timeout: 300

  # ── Model management ───────────────────────────────────────────────────────

  list_models:
    description: >
      List all models downloaded on this machine with size and metadata.
    returns: model[]
    connection: api
    python:
      module: ./ollama.py
      function: list_models
      timeout: 15

  list_models_cli:
    description: >
      List models via the Ollama CLI binary. Use when the REST server may not be
      running or you want to verify from the CLI side.
    returns: model[]
    connection: cli
    python:
      module: ./ollama.py
      function: list_models_cli
      timeout: 15

  pull_model:
    description: >
      Download a model from the Ollama registry. Uses the CLI by default for
      reliable progress on large downloads; can also use the REST API.
      Timeout is 10 minutes — large models (e.g. 19GB GLM) take several minutes.
    returns:
      status: { type: string }
      model: { type: string }
      message: { type: string }
    connection: [cli, api]
    params:
      model:
        type: string
        required: true
        description: "Model tag to pull (e.g. qwen3.5:9b-q8_0, glm-4.7-flash)"
    python:
      module: ./ollama.py
      function: op_pull_model
      timeout: 600

  delete_model:
    description: Delete a downloaded model, freeing disk space.
    returns:
      status: { type: string }
      model: { type: string }
      message: { type: string }
    connection: [api, cli]
    params:
      model:
        type: string
        required: true
        description: "Model name to delete (e.g. qwen3.5:9b)"
    python:
      module: ./ollama.py
      function: op_delete_model
      timeout: 30

  ps:
    description: >
      Show which models are currently loaded in memory (GPU/unified RAM).
      Useful for checking what's hot and what will need to reload on next use.
    returns: loaded_model[]
    connection: api
    python:
      module: ./ollama.py
      function: ps
      timeout: 15


  show_model:
    description: >
      Show detailed model info: architecture, parameter count, quantization,
      context window length, template, and system prompt.
    returns:
      name: { type: string }
      format: { type: string }
      family: { type: string }
      parameter_size: { type: string }
      quantization_level: { type: string }
      context_length: { type: integer }
      template: { type: string }
      system_prompt: { type: string }
    connection: api
    params:
      model:
        type: string
        required: true
        description: "Model name"
    python:
      module: ./ollama.py
      function: op_show_model
      timeout: 15
