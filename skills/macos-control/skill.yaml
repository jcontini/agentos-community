id: macos-control
name: macOS Control
description: Inspect macOS apps, processes, displays, windows, screenshots, and filesystem with built-in system tools
color: "#111827"
website: https://www.apple.com/macos/
connections: {}
provides:
  - tool: file_list
    via: list_directory
    description: "List files and folders in a directory on the local filesystem"
  - tool: file_read
    via: read_file
    description: "Read file contents from the local filesystem"
  - tool: file_info
    via: get_info
    description: "Get filesystem info — volumes, home dir, special folders"
operations:
  list_apps:
    description: List installed macOS applications using system_profiler
    params:
      limit:
        type: integer
        description: Optional maximum number of apps to return
    returns:
      apps:
        type: array
        description: Installed applications
      count: integer
    python:
      module: ./macos_control.py
      function: list_apps
      timeout: 60

  list_processes:
    description: List running macOS processes with stable fields from ps
    params:
      limit:
        type: integer
        description: Optional maximum number of processes to return
    returns:
      processes:
        type: array
        description: Running processes
      count: integer
    python:
      module: ./macos_control.py
      function: list_processes
      timeout: 15

  list_displays:
    description: List connected displays with geometry for left/right monitor reasoning
    returns:
      displays:
        type: array
        description: Connected displays
      count: integer
    python:
      module: ./macos_control.py
      function: list_displays
      timeout: 15

  list_windows:
    description: List useful user-facing application windows with capture eligibility
    params:
      limit:
        type: integer
        description: Optional maximum number of windows to return
    returns:
      windows:
        type: array
        description: User-facing application windows
      count: integer
    python:
      module: ./macos_control.py
      function: list_windows
      timeout: 30

  screenshot_window:
    description: Capture a screenshot of a specific application window by window_id
    returns: image
    params:
      window_id:
        type: integer
        required: true
        description: Window ID from list_windows
      path:
        type: string
        description: Optional output path for the PNG file
    python:
      module: ./macos_control.py
      function: screenshot_window
      timeout: 20

  screenshot_display:
    description: Capture a screenshot of a display by display_id or display_index
    returns: image
    params:
      display_id:
        type: string
        description: Display ID from list_displays
      display_index:
        type: integer
        description: 1-based display index from list_displays
      path:
        type: string
        description: Optional output path for the PNG file
    python:
      module: ./macos_control.py
      function: screenshot_display
      timeout: 20

  clipboard_read:
    description: Read the current macOS clipboard contents
    returns:
      text: string
    python:
      module: ./macos_control.py
      function: clipboard_read
      timeout: 5

  clipboard_write:
    description: Write text to the macOS clipboard
    params:
      text: { type: string, required: true, description: "Text to copy to clipboard" }
    returns:
      status: string
      length: integer
    python:
      module: ./macos_control.py
      function: clipboard_write
      timeout: 5

  list_directory:
    description: List files and folders in a directory with metadata
    params:
      path:
        type: string
        description: "Directory path to list (default: home directory). Supports ~ expansion."
      show_hidden:
        type: boolean
        description: "Include hidden files (dotfiles). Default: false."
      sort:
        type: string
        description: "Sort by: name, size, modified, kind. Default: name."
    returns:
      path: string
      entries:
        type: array
        description: "File and folder entries with shape-compatible fields"
      count: integer
    python:
      module: ./macos_control.py
      function: list_directory
      timeout: 10

  read_file:
    description: Read file contents — text as UTF-8, binary as base64
    params:
      path:
        type: string
        required: true
        description: "Absolute or ~ path to the file"
    returns:
      name: string
      path: string
      content: string
      encoding: string
      mime_type: string
      size: integer
    python:
      module: ./macos_control.py
      function: read_file
      timeout: 10

  get_info:
    description: Get filesystem info — home dir, special folders, mounted volumes
    returns:
      provider: string
      provider_name: string
      home: string
      special_folders:
        type: object
        description: "Well-known folders: desktop, documents, downloads"
      volumes:
        type: array
        description: "Mounted volumes with capacity and filesystem info"
    python:
      module: ./macos_control.py
      function: get_info
      timeout: 15

  get_file_info:
    description: Get detailed file/folder properties — size, dates, permissions, type
    params:
      path:
        type: string
        required: true
        description: "Absolute or ~ path to the file or folder"
    returns:
      name: string
      path: string
      kind: string
      size: integer
      size_on_disk: integer
      created: string
      modified: string
      accessed: string
      mime_type: string
      permissions: string
      owner: string
      group: string
      hidden: boolean
      read_only: boolean
    python:
      module: ./macos_control.py
      function: get_file_info
      timeout: 10
