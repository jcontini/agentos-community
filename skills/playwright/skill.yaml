id: playwright
name: Playwright
description: Browser automation — navigate, click, fill, screenshot, and inspect web pages via a persistent Chromium session
color: "#2EAD33"

website: https://playwright.dev

connections: {}

provides:
  - auth: cookies
    via: cookie_get
    account_param: domain
    live_session: true
    creation_timestamps: false
    description: "Extract cookies from persistent Chromium session via CDP. Session-scoped — cookies do not survive browser restarts."

operations:
  goto:
    description: "Navigate the browser to a URL. Returns the resulting title and URL. Uses wait_until=load by default — do NOT use networkidle for SPAs or apps with background polling (they never settle)."
    returns:
      url: string
      title: string
    params:
      url:
        type: string
        required: true
        description: URL to navigate to
      wait_until:
        type: string
        description: "Wait condition: load (default), domcontentloaded, networkidle. Avoid networkidle for SPAs."
    python:
      module: ./playwright_ops.py
      function: goto

  read_webpage:
    description: Extract text or HTML content from the current page or a CSS selector. Useful for reading `script#__NEXT_DATA__` or specific app containers before falling back to screenshots.
    returns:
      url: string
      title: string
      content: string
    params:
      selector:
        type: string
        description: "CSS selector to extract from (default: body)"
      format:
        type: string
        description: "Output format: text or html (default: text)"
    python:
      module: ./playwright_ops.py
      function: read_webpage

  start:
    description: "Launch or connect to a persistent Chromium browser. If already running, returns immediately. Mode: 'headed' (default) shows a visible window, 'headless' runs invisibly."
    params:
      mode:
        type: string
        description: "'headed' (default) — visible browser window. 'headless' — no visible window, runs in background."
      port:
        type: integer
        description: "CDP port (default: 9222)"
    returns:
      status: string
      port: integer
      url: string
    python:
      module: ./playwright_ops.py
      function: start

  stop:
    description: Kill the persistent browser process
    returns: void
    python:
      module: ./playwright_ops.py
      function: stop

  status:
    description: Check if the browser is running and get current URL
    returns:
      running: boolean
      port: integer
      url: string
    python:
      module: ./playwright_ops.py
      function: status

  screenshot:
    description: Capture a screenshot of the full page or a specific element
    params:
      selector:
        type: string
        description: CSS selector for element screenshot (omit for full page)
      path:
        type: string
        description: "Output file path (default: /tmp/screenshot.png)"
      full_page:
        type: boolean
        description: Capture full scrollable page (default for no selector)
    returns:
      path: string
    python:
      module: ./playwright_ops.py
      function: screenshot

  click:
    description: Click an element by CSS selector
    params:
      selector:
        type: string
        required: true
        description: CSS selector of element to click
    returns:
      selector: string
      url: string
    python:
      module: ./playwright_ops.py
      function: click

  dblclick:
    description: Double-click an element by CSS selector. Use this to open apps on the desktop (icons require double-click, not single click).
    params:
      selector:
        type: string
        required: true
        description: CSS selector of element to double-click
    returns:
      selector: string
      url: string
    python:
      module: ./playwright_ops.py
      function: dblclick

  fill:
    description: Fill an input field with a value (clears existing content first)
    params:
      selector:
        type: string
        required: true
        description: CSS selector of the input field
      value:
        type: string
        required: true
        description: Value to fill
    returns:
      selector: string
      value: string
    python:
      module: ./playwright_ops.py
      function: fill

  select:
    description: Select an option from a dropdown
    params:
      selector:
        type: string
        required: true
        description: CSS selector of the select element
      value:
        type: string
        required: true
        description: Option value to select
    returns:
      selector: string
      value: string
    python:
      module: ./playwright_ops.py
      function: select

  type:
    description: Type text character by character (for inputs that need real keystrokes, not just value setting)
    params:
      selector:
        type: string
        required: true
        description: CSS selector of the input
      text:
        type: string
        required: true
        description: Text to type
    returns:
      selector: string
      text: string
    python:
      module: ./playwright_ops.py
      function: type

  evaluate:
    description: Execute arbitrary JavaScript in the page context and return the result. Useful for dumping `window.__NEXT_DATA__`, Apollo caches, route state, or framework globals.
    params:
      script:
        type: string
        required: true
        description: JavaScript code to execute
    returns:
      result: string
    python:
      module: ./playwright_ops.py
      function: evaluate

  url:
    description: Get the current page URL and title
    returns:
      url: string
      title: string
    python:
      module: ./playwright_ops.py
      function: url

  inspect:
    description: "Fast DOM snapshot — returns structured tree of tags, attributes, and text. Use this instead of screenshot to understand page structure."
    params:
      selector:
        type: string
        description: "CSS selector to inspect (default: body)"
    returns:
      url: string
      title: string
      snapshot: object
    python:
      module: ./playwright_ops.py
      function: inspect

  errors:
    description: Reload the current page and capture any console errors
    returns:
      errors: array
      count: integer
      url: string
    python:
      module: ./playwright_ops.py
      function: errors

  wait:
    description: Wait for a CSS selector to appear or a timeout to elapse
    params:
      selector:
        type: string
        description: CSS selector to wait for
      timeout:
        type: integer
        description: "Max wait in milliseconds (default: 10000)"
    returns:
      status: string
    python:
      module: ./playwright_ops.py
      function: wait

  tabs:
    description: List all open browser tabs
    returns:
      tabs: array
      count: integer
    python:
      module: ./playwright_ops.py
      function: tabs

  new_tab:
    description: Open a new browser tab, optionally navigating to a URL
    params:
      url:
        type: string
        description: URL to open in the new tab
    returns:
      url: string
      title: string
    python:
      module: ./playwright_ops.py
      function: new_tab

  close_tab:
    description: Close the current browser tab
    returns: void
    python:
      module: ./playwright_ops.py
      function: close_tab

  cookie_get:
    description: |
      Extract cookies for a domain from the browser's active session via CDP.
      Returns all cookies matching the domain (including HttpOnly cookies that
      JavaScript cannot access). Use this after a login flow to capture session
      cookies for storage. The cookies are returned in Playwright's cookie format
      with name, value, domain, path, expires, httpOnly, secure, sameSite.
    params:
      domain:
        type: string
        required: true
        description: "Cookie domain to match (e.g. '.claude.ai', '.chase.com')"
      names:
        type: string
        description: "Comma-separated cookie names to filter (e.g. 'sessionKey,csrf_token'). Omit for all cookies on the domain."
    returns:
      domain: string
      cookies: array
      count: integer
      url: string
    python:
      module: ./playwright_ops.py
      function: cookie_get

  clear_cookies:
    description: |
      Clear cookies for a domain. Use when persistent cookies (e.g. from capture_network
      cookie injection) prevent reaching the login form. Preserves cookies for other domains.
    params:
      domain:
        type: string
        required: true
        description: "Domain whose cookies to clear (e.g. '.goodreads.com', '.claude.ai')"
    returns:
      cleared_domain: string
      cleared_count: integer
      kept_count: integer
    python:
      module: ./playwright_ops.py
      function: clear_cookies

  capture_network:
    description: |
      Navigate to a URL and capture all network requests/responses.
      Optionally inject cookies before navigating (useful for authenticated pages).
      Returns every XHR/fetch response matching the pattern, including the parsed
      JSON body for JSON responses. Use this to discover undocumented API endpoints
      that a page calls — e.g. to find the real backend endpoint Chase's dashboard
      hits when it loads account data.

      This is especially useful for GraphQL and AppSync-backed sites. Even when
      request metadata is limited, response bodies often reveal operation names,
      entity shapes, pagination structure, and field-level authorization errors.

      Pattern uses glob syntax: "**" matches everything, "**/svc/**" matches any
      URL with /svc/ in the path. Default pattern captures all non-asset requests.

      Wait time (default 5000ms) controls how long after navigation to keep
      listening — increase for SPAs that make deferred async calls.
    params:
      url:
        type: string
        required: true
        description: "URL to navigate to"
      pattern:
        type: string
        description: "Glob URL pattern to match (default: ** = all non-asset requests)"
      wait:
        type: integer
        description: "Milliseconds to wait after navigation for async requests (default: 5000)"
      cookie_domain:
        type: string
        description: "Cookie domain to resolve automatically (e.g. '.uber.com'). Cookies are resolved from available browser providers via the auth system. Overridden by explicit cookies param."
      cookies:
        type: array
        description: "Manual cookie injection (overrides cookie_domain). Each item: {name, value, domain, path}."
      capture_body:
        type: boolean
        description: "Capture JSON response bodies (default: true)"
    returns:
      url: string
      title: string
      captured: array
      count: integer
    python:
      module: ./playwright_ops.py
      function: capture_network

  run_flow:
    description: |
      Execute a scripted browser automation flow in an ephemeral browser.
      Launches a fresh Chromium, runs steps in order, returns results, closes.
      Use this for repeatable auth flows and login sequences — NOT for interactive exploration
      (use get_webpage/click/fill for that).

      Steps: goto, click, dblclick, right_click, fill, type, wait_for, wait (ms),
      extract_cookies, extract (selector → named value), screenshot, close.

      wait_for conditions: cookie (name), selector (CSS), url_matches (regex), any (array of conditions).
      Detects 2FA prompts automatically and returns needs_2fa: true.

      After discovery, implement the same flow with HTTPX in Python for production use.
    params:
      steps:
        type: array
        required: true
        description: "Automation steps — e.g. [{goto: 'https://...'}, {click: 'button'}, {wait_for: {url_matches: 'dashboard'}}, {extract_cookies: ['session']}]"
      headless:
        type: boolean
        description: "Run without visible window (default: false — visible for debugging)"
      size:
        type: string
        description: "Window size preset: mobile (iPhone), compact (480x720), full (1280x800). Default: compact"
    returns:
      success: boolean
      cookies: object
      extracted: object
      needs_2fa: boolean
      error: string
    command:
      binary: bash
      args: ["-l", "-c", "npx tsx ./scripts/runner.ts"]
      working_dir: .
      stdin: '.params | {steps: .steps, launch: {headless: (.headless // false), size: (.size // "compact")}}'
      timeout: 300
