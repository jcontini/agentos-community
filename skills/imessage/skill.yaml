id: imessage
name: iMessage
description: Send and read iMessages and SMS from macOS Messages app
color: "#34C759"
website: https://support.apple.com/messages

product:
  name: iMessage
  website: https://support.apple.com/messages
  developer: Apple Inc.
connections:
  db:
    sqlite: "~/Library/Messages/chat.db"
# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  list_conversations:
    description: List all iMessage/SMS conversations
    returns: conversation[]
    params:
      limit: { type: integer }
    python:
      module: ./imessage.py
      function: op_list_conversations

  get_conversation:
    description: Get a specific conversation with metadata
    returns: conversation
    params:
      id: { type: string, required: true }
    python:
      module: ./imessage.py
      function: op_get_conversation

  list_messages:
    description: List messages in a conversation
    returns: message[]
    params:
      conversation_id: { type: string, required: true }
      limit: { type: integer }
    python:
      module: ./imessage.py
      function: op_list_messages

  get_message:
    description: Get a specific message by ID
    returns: message
    params:
      id: { type: string, required: true }
    python:
      module: ./imessage.py
      function: op_get_message

  search_messages:
    description: Search messages by text content
    returns: message[]
    params:
      query: { type: string, required: true }
      limit: { type: integer }
    python:
      module: ./imessage.py
      function: op_search_messages

  send_message:
    description: Send an iMessage or SMS to a phone number or email
    returns: void
    params:
      to: { type: string, required: true, description: "Recipient phone number (E.164 like +14155551234) or email address" }
      text: { type: string, required: true, description: "Message body" }
      service: { type: string, default: "imessage", description: "Service: imessage, sms, or auto" }
      file: { type: string, description: "Path to file attachment" }
    python:
      module: ./imessage.py
      function: op_send_message
