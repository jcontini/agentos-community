id: gandi
name: Gandi
description: Domain and DNS management via the Gandi API
color: "#E74B3C"

website: https://www.gandi.net
privacy_url: https://www.gandi.net/en/contracts/privacy-policy

connections:
  api:
    base_url: "https://api.gandi.net/v5"
    auth:
      type: api_key
      header:
        Authorization: '"Bearer " + .auth.key'
    label: Personal Access Token
    help_url: https://admin.gandi.net/organizations/account/pat

operations:
  list_domains:
    description: List all domains in your Gandi account
    returns: domain[]
    connection: api
    python:
      module: ./gandi.py
      function: list_domains

  get_domain:
    description: Get details for a single domain
    returns: domain
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name, for example example.com
    python:
      module: ./gandi.py
      function: get_domain

  list_dns_records:
    description: List DNS records for a domain
    returns: dns_record[]
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
    python:
      module: ./gandi.py
      function: list_dns_records

  get_dns_record:
    description: Get one DNS record by name and type
    returns: dns_record
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      name:
        type: string
        required: true
        description: Record name, use @ for the apex
      type:
        type: string
        required: true
        description: Record type such as A, AAAA, CNAME, MX, or TXT
    python:
      module: ./gandi.py
      function: get_dns_record

  upsert_dns_record:
    description: Create or replace a DNS record
    returns: void
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      name:
        type: string
        required: true
        description: Record name, use @ for the apex
      type:
        type: string
        required: true
        description: Record type such as A, AAAA, CNAME, MX, or TXT
      values:
        type: array
        required: true
        description: Array of record values
      ttl:
        type: integer
        default: 3600
        description: TTL in seconds
    python:
      module: ./gandi.py
      function: upsert_dns_record

  delete_dns_record:
    description: Delete a DNS record
    returns: void
    connection: api
    params:
      domain:
        type: string
        required: true
        description: Domain name
      name:
        type: string
        required: true
        description: Record name, use @ for the apex
      type:
        type: string
        required: true
        description: Record type
    python:
      module: ./gandi.py
      function: delete_dns_record
