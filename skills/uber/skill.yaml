id: uber
name: Uber
description: Ride history, trip details, Eats order history, and account info from Uber
color: "#000000"

website: https://uber.com
product:
  name: Uber
  website: https://uber.com
  developer: Uber Technologies

provides:
  - tool: geocoding
    via: search_address
    description: "Worldwide address geocoding — autocomplete + lat/lng resolution via HERE Maps"

connections:
  web:
    description: "Uber rider account — requires cookies from a logged-in browser session"
    base_url: "https://riders.uber.com"
    domain: uber.com
    auth:
      type: cookies
      domain: ".uber.com"
      account:
        check: check_session
    label: "Uber Rider"
    help_url: "https://riders.uber.com"

  eats:
    description: "Uber Eats — requires cookies from a logged-in ubereats.com browser session"
    base_url: "https://www.ubereats.com"
    domain: ubereats.com
    auth:
      type: cookies
      domain: ".ubereats.com"
      account:
        check: check_eats_session
    label: "Uber Eats"
    help_url: "https://www.ubereats.com"

operations:
  check_session:
    description: "Validate session cookies and return account identity"
    returns:
      authenticated: boolean
      identifier: string
      display: string
      domain: string
    connection: web
    python:
      module: ./uber.py
      function: check_session
      timeout: 30

  list_trips:
    description: "List ride history — destination, fare with currency, map. Supports pagination."
    returns: trip[]
    params:
      limit:
        type: integer
        description: "Number of trips to return (default: 10, max: 50)"
      next_page_token:
        type: string
        description: "Pagination token from a previous response"
      profile_type:
        type: string
        description: "Profile filter: PERSONAL (default) or BUSINESS"
      order_types:
        type: string
        description: "Comma-separated order types: RIDES, TRAVEL, EATS (default: RIDES,TRAVEL)"
    connection: web
    python:
      module: ./uber.py
      function: list_trips
      timeout: 30

  get_trip:
    description: "Get full trip details — driver (person), origin/destination (places), legs for multi-stop rides, fare with currency"
    returns: trip
    params:
      trip_id:
        type: string
        required: true
        description: "Trip UUID (from list_trips)"
    connection: web
    python:
      module: ./uber.py
      function: get_trip
      timeout: 30

  whoami:
    description: "Get Uber account — name, email, phone, rating, payment methods, Uber One, business profiles"
    returns:
      id: string
      name: string
      email: string
      phone: string
      rating: string
      hasUberOne: boolean
      paymentMethods: array
      profiles: array
      country: string
    connection: web
    python:
      module: ./uber.py
      function: whoami
      timeout: 30

  # ─────────────────────────────────────────────────────────────────────────
  # EATS — uses "eats" connection (.ubereats.com cookies)
  # API docs: requirements.md | E2E spec: docs/specs/uber-eats-e2e.md
  # ─────────────────────────────────────────────────────────────────────────

  check_eats_session:
    description: "Validate Uber Eats session cookies and return account identity"
    returns:
      authenticated: boolean
      identifier: string
      display: string
      domain: string
    connection: eats
    python:
      module: ./uber.py
      function: check_eats_session
      timeout: 30

  get_eats_profile:
    description: "Get Uber Eats user profile — name, email, phone, saved addresses, payment methods, Uber One status"
    returns:
      id: string
      name: string
      email: string
      phone: string
      subscription: object
      savedAddresses: array
      paymentMethods: array
    connection: eats
    python:
      module: ./uber.py
      function: get_eats_profile
      timeout: 30

  list_deliveries:
    description: "List Uber Eats order history — past orders with store, total, items, delivery address"
    returns: order[]
    params:
      cursor:
        type: string
        description: "Pagination cursor from a previous response"
    connection: eats
    python:
      module: ./uber.py
      function: list_deliveries
      timeout: 30

  get_delivery:
    description: "Get full delivery details — items, fare breakdown, receipt data"
    returns: order
    params:
      order_uuid:
        type: string
        required: true
        description: "Order UUID (from list_deliveries)"
    connection: eats
    python:
      module: ./uber.py
      function: get_delivery
      timeout: 30

  search_address:
    description: "Geocoding — search for addresses worldwide with autocomplete. Returns structured addresses with lat/lng, city, state, zip, neighborhood."
    returns: place[]
    params:
      query:
        type: string
        required: true
        description: "Address query (e.g. '350 5th Ave New York', 'Rome Italy', '1600 Pennsylvania Ave')"
      resolve:
        type: boolean
        description: "Resolve coordinates + structured address (default: true). Set false for faster typeahead-only results."
    connection: eats
    python:
      module: ./uber.py
      function: search_address
      timeout: 30

  list_addresses:
    description: "Saved and suggested delivery addresses — full structured addresses with lat/lng, delivery notes, and categories"
    returns: place[]
    connection: eats
    python:
      module: ./uber.py
      function: list_addresses
      timeout: 15

  get_messages:
    description: "Delivery chat messages — courier/store communication during active delivery. Chat is ephemeral (only available during/shortly after delivery)."
    returns: order
    params:
      order_uuid:
        type: string
        required: true
        description: "Order UUID (from list_deliveries or track_delivery)"
    connection: eats
    python:
      module: ./uber.py
      function: get_messages
      timeout: 15

  search_stores:
    description: "Search for stores/restaurants by name or cuisine. Returns suggestions if no query."
    returns: place[]
    params:
      query:
        type: string
        description: "Search term (e.g. 'pizza', 'Sammataro', 'thai food'). Omit for suggestions."
    connection: eats
    python:
      module: ./uber.py
      function: search_stores
      timeout: 15

  list_nearby_stores:
    description: "Browse stores and restaurants available for delivery near the user's saved address"
    returns: place[]
    connection: eats
    python:
      module: ./uber.py
      function: list_nearby_stores
      timeout: 30

  get_store:
    description: "Get store location, hours, rating, and full product catalog"
    returns: place
    params:
      store_uuid:
        type: string
        required: true
        description: "Store UUID (from list_nearby_stores, list_deliveries, or search)"
    connection: eats
    python:
      module: ./uber.py
      function: get_store
      timeout: 30

  get_item_customizations:
    description: "Get customization options for a menu item — toppings, sizes, sides with prices. Use with items where hasCustomizations is true."
    returns: product
    params:
      store_uuid:
        type: string
        required: true
        description: "Store UUID"
      item_uuid:
        type: string
        required: true
        description: "Item UUID (from get_store or search_products)"
      section_uuid:
        type: string
        required: true
        description: "Catalog section UUID (from item's _raw.sectionUuid)"
      subsection_uuid:
        type: string
        required: true
        description: "Catalog subsection UUID (from item's _raw.subsectionUuid)"
    connection: eats
    python:
      module: ./uber.py
      function: get_item_customizations
      timeout: 15

  search_products:
    description: "Search products within a store — returns dietary tags (VEGAN, Non-GMO, SNAP), prices, weight, aisles"
    returns: product[]
    params:
      store_uuid:
        type: string
        required: true
        description: "Store UUID"
      query:
        type: string
        required: true
        description: "Search term (e.g. 'olive oil', 'organic banana')"
    connection: eats
    python:
      module: ./uber.py
      function: search_products
      timeout: 15

  # ─────────────────────────────────────────────────────────────────────────
  # EATS CART (WRITE operations — modify cart state)
  # API shapes: requirements.md "addItemsToDraftOrderV2" + "createDraftOrderV2"
  # ─────────────────────────────────────────────────────────────────────────

  add_to_cart:
    description: "Add items to an Uber Eats cart — creates a draft order with products. WRITE operation."
    returns: order
    params:
      store_uuid:
        type: string
        required: true
        description: "Store UUID"
      items:
        type: json
        required: true
        description: "Array of product dicts from get_store (must include _raw field from catalog)"
    connection: eats
    python:
      module: ./uber.py
      function: add_to_cart
      timeout: 60

  get_cart:
    description: "Get current Uber Eats carts as draft orders with products"
    returns: order[]
    connection: eats
    python:
      module: ./uber.py
      function: get_cart
      timeout: 30

  clear_cart:
    description: "Clear an Uber Eats cart (discard draft order). WRITE operation."
    returns:
      status: string
      draft_order_uuid: string
    params:
      draft_order_uuid:
        type: string
        required: true
        description: "Draft order UUID to discard (from get_cart or add_to_cart)"
    connection: eats
    python:
      module: ./uber.py
      function: clear_cart
      timeout: 30

  checkout:
    description: "Place an Uber Eats order from a draft cart. WRITE — spends money, requires explicit user consent."
    returns: order
    params:
      draft_order_uuid:
        type: string
        required: true
        description: "Draft order UUID to checkout (from add_to_cart or get_cart)"
    connection: eats
    python:
      module: ./uber.py
      function: checkout
      timeout: 60

  track_delivery:
    description: "Track a live delivery — courier GPS, ETA, progress, item fulfillment states (PENDING/FOUND/REPLACED/NOT_FOUND). Omit order_uuid to auto-discover active orders."
    returns: order
    params:
      order_uuid:
        type: string
        required: false
        description: "Order UUID — omit to auto-discover the current active delivery"
    connection: eats
    python:
      module: ./uber.py
      function: track_delivery
      timeout: 30
