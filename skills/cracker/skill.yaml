id: cracker
name: Cracker
description: >
  Sound-triggered voice input for Mac. Click your tongue to start dictation,
  click again to stop. Say "never mind" to cancel. Wraps parrot.py with a
  menu bar app, guided training wizard, and auto-start at login.
website: https://github.com/agentos-community/cracker
color: "#16A34A"

