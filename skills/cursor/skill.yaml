id: cursor
name: Cursor
description: AI-first code editor with built-in MCP support
color: "#3B82F6"
website: https://cursor.com

connections: {}

operations:

  # ── Session history ──────────────────────────────────────────────────────────

  list_sessions:
    description: >
      List Cursor AI sessions from local JSONL transcripts (fast, sub-second).
      Only includes recent sessions — Cursor started writing JSONL transcripts around Feb 2026.
      For full history including older sessions, use session.backfill.
    returns: session[]
    params: {}
    python:
      module: ./cursor.py
      function: op_list_sessions
      timeout: 60

  backfill_session:
    description: >
      Import ALL Cursor sessions including full history from SQLite databases.
      Reads both JSONL transcripts (recent) and Cursor's workspace/global SQLite
      databases (going back months). Run once to seed the graph with full conversation
      history; subsequent list_sessions calls keep it current.
      Optionally filter to a specific workspace path.
    returns: session[]
    params:
      workspace:
        type: string
        description: Filter to workspace path (e.g. /Users/joe/dev/agentos). Omit for all workspaces.
    python:
      module: ./cursor.py
      function: op_backfill_session
      args:
        workspace: .params.workspace
      timeout: 300

  get_session:
    description: Get a Cursor session by UUID with full transcript (checks JSONL then SQLite)
    returns: session
    params:
      id:
        type: string
        required: true
        description: Session UUID
    python:
      module: ./cursor.py
      function: op_get_session
      args:
        id: .params.id
      timeout: 30

  # ── Research extraction ──────────────────────────────────────────────────────

  pull_document:
    description: >
      Extract research reports from Cursor sub-agent Task tool results.
      Scans the global Cursor SQLite store for Task blobs that meet research thresholds
      (3+ web searches, 3000+ chars output, 5+ conversation steps) and returns them
      as document entities for the graph.
    returns: document[]
    params: {}
    python:
      module: ./cursor.py
      function: op_pull_document
      timeout: 120

  # ── MCP configuration ────────────────────────────────────────────────────────

  install_mcp:
    description: >
      Install the agentOS MCP server into a client's config so agents can use agentOS tools.
      For Cursor, writes to ~/.cursor/mcp.json (user-level, not project-level).
      Auto-detects the agentos binary from the running engine PID, existing config, or PATH.
      Writes atomically to prevent config corruption.
    returns:
      status: string
      path: string
      config: string
      message: string
    params:
      binary_path:
        type: string
        description: >
          Path to the agentos binary. Auto-detected if omitted — checks the running
          engine process, existing mcp.json, then PATH.
      client:
        type: string
        description: "MCP client to configure. Supported: cursor (default). More clients coming."
    python:
      module: ./cursor.py
      function: install_mcp
      args:
        binary_path: .params.binary_path
        client: '.params.client // "cursor"'
      timeout: 15

  uninstall_mcp:
    description: >
      Remove the agentOS MCP server from a client's config file.
      For Cursor, edits ~/.cursor/mcp.json atomically.
    returns:
      status: string
      config: string
      message: string
    params:
      client:
        type: string
        description: "MCP client to configure. Supported: cursor (default)."
    python:
      module: ./cursor.py
      function: uninstall_mcp
      args:
        client: '.params.client // "cursor"'
      timeout: 15
