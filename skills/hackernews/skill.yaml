id: hackernews
name: Hacker News
description: Read Hacker News stories, comments, and discussions
color: "#FF6600"

website: https://news.ycombinator.com
privacy_url: https://www.ycombinator.com/legal#privacy
terms_url: https://www.ycombinator.com/legal
connections: {}

provides:
  - tool: web_read
    via: get_post
    urls:
      - "news.ycombinator.com/item*"
  - tool: web_search
    via: search_posts

# ═══════════════════════════════════════════════════════════════════════════════
# ADAPTERS
# ═══════════════════════════════════════════════════════════════════════════════

adapters:
  post:
    id: .objectID
    name: .title
    text: .text
    url: '"https://news.ycombinator.com/item?id=" + .objectID'
    author: .author
    datePublished: .created_at
    external_url: .url
    replies: .replies
    engagement.score: .points
    engagement.comment_count: .num_comments
    posted_by:
      account:
        id: .author
        platform: '"hackernews"'
        handle: .author
        display_name: .author
        url: '"https://news.ycombinator.com/user?id=" + .author'
    parent_id:
      ref: post
      value: .parent_id
      rel: replies_to

# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:
  list_posts:
    description: List Hacker News stories by feed type
    returns: post[]
    web_url: '"https://news.ycombinator.com/" + (if .params.feed == "front" then "" else .params.feed end)'
    params:
      feed:
        type: string
        default: "front"
        description: "Feed type: front, new, ask, show"
      limit:
        type: integer
        description: "Number of stories (max 100)"
    rest:
      method: GET
      url: '"https://hn.algolia.com/api/v1/" + (if .params.feed == "new" then "search_by_date" else "search" end)'
      query:
        tags: '.params.feed | if . == "new" then "story" elif . == "ask" then "ask_hn" elif . == "show" then "show_hn" else "front_page" end'
        hitsPerPage: .params.limit
      response:
        root: "/hits"
    test:
      mode: read
      fixtures:
        feed: front
        limit: 3

  search_posts:
    description: Search Hacker News stories
    returns: post[]
    web_url: '"https://hn.algolia.com/?query=" + (.params.query | @uri)'
    params:
      query:
        type: string
        required: true
        description: "Search query"
      limit:
        type: integer
        description: "Number of results (max 100)"
    rest:
      method: GET
      url: https://hn.algolia.com/api/v1/search
      query:
        query: .params.query
        tags: '"story"'
        hitsPerPage: .params.limit
      response:
        root: "/hits"
    test:
      mode: read

  get_post:
    description: Get a Hacker News story with comments
    returns: post
    web_url: '"https://news.ycombinator.com/item?id=" + (if (.params.url // "") != "" then (.params.url | capture("[?&]id=(?<pid>[0-9]+)") | .pid) else .params.id end)'
    params:
      id:
        type: string
        description: "Story ID (optional if url is a news.ycombinator.com item link)"
      url:
        type: string
        description: "HN item URL with id= in the query (web_read)"
    rest:
      method: GET
      url: '"https://hn.algolia.com/api/v1/items/" + (if (.params.url // "") != "" then (.params.url | capture("[?&]id=(?<pid>[0-9]+)") | .pid) else .params.id end)'
      response:
        transform: |
          def map_comment:
            {
              id: (.id | tostring),
              content: .text,
              posted_by: {
                account: {
                  id: .author,
                  platform: "hackernews",
                  handle: .author,
                  display_name: .author,
                  url: ("https://news.ycombinator.com/user?id=" + .author)
                }
              },
              published_at: .created_at,
              replies: [.children[]? | map_comment]
            };
          {
            objectID: (.id | tostring),
            title: .title,
            text: .text,
            url: .url,
            author: .author,
            points: .points,
            num_comments: (.children | length),
            created_at: .created_at,
            replies: [.children[]? | map_comment]
          }
    test:
      mode: read
      discover_from:
        op: list_posts
        params:
          feed: front
          limit: 3
        map:
          id: id

  comments_post:
    description: |
      Get comments on a Hacker News story as graph-native entities.
      Returns a flat list: the parent story first, then all comments in parent-first order.
      Each comment becomes a post entity with replies_to relationship to its parent.
    returns: post[]
    web_url: '"https://news.ycombinator.com/item?id=" + .params.id'
    params:
      id:
        type: string
        required: true
        description: "Story ID"
    command:
      binary: bash
      args:
        - ./comments_post.sh
        - ".params.id"
      timeout: 30
    test:
      mode: read
      discover_from:
        op: list_posts
        params:
          feed: front
          limit: 3
        map:
          id: id
