id: hackernews
name: Hacker News
description: Read Hacker News stories, comments, and discussions
color: "#FF6600"

website: https://news.ycombinator.com
privacy_url: https://www.ycombinator.com/legal#privacy
terms_url: https://www.ycombinator.com/legal
connections: {}

provides:
  - tool: web_read
    via: get_post
    urls:
      - "news.ycombinator.com/item*"
  - tool: web_search
    via: search_posts

operations:
  list_posts:
    description: List Hacker News stories by feed type
    returns: post[]
    web_url: '"https://news.ycombinator.com/" + (if .params.feed == "front" then "" else .params.feed end)'
    params:
      feed:
        type: string
        default: "front"
        description: "Feed type: front, new, ask, show"
      limit:
        type: integer
        description: "Number of stories (max 100)"
    python:
      module: ./hackernews.py
      function: list_posts
    test:
      params:
        feed: front
        limit: 3

  search_posts:
    description: Search Hacker News stories
    returns: post[]
    web_url: '"https://hn.algolia.com/?query=" + (.params.query | @uri)'
    params:
      query:
        type: string
        required: true
        description: "Search query"
      limit:
        type: integer
        description: "Number of results (max 100)"
    python:
      module: ./hackernews.py
      function: search_posts

  get_post:
    description: Get a Hacker News story with comments
    returns: post
    web_url: '"https://news.ycombinator.com/item?id=" + (if (.params.url // "") != "" then (.params.url | capture("[?&]id=(?<pid>[0-9]+)") | .pid) else .params.id end)'
    params:
      id:
        type: string
        description: "Story ID (optional if url is a news.ycombinator.com item link)"
      url:
        type: string
        description: "HN item URL with id= in the query (web_read)"
    python:
      module: ./hackernews.py
      function: get_post
    test:
      params:
        id: "1"
        url: ~

  comments_post:
    description: |
      Get comments on a Hacker News story as graph-native entities.
      Returns a flat list: the parent story first, then all comments in parent-first order.
      Each comment becomes a post entity with replies_to relationship to its parent.
    returns: post[]
    web_url: '"https://news.ycombinator.com/item?id=" + .params.id'
    params:
      id:
        type: string
        required: true
        description: "Story ID"
    python:
      module: ./hackernews.py
      function: comments_post
