id: amazon
name: Amazon
description: Search products, get details, and access your Amazon account
color: "#FF9900"

website: https://www.amazon.com
connections:
  public:
    description: "Public Amazon pages and autocomplete API — no auth needed"
  web:
    description: "Amazon account — orders, recommendations, account details"
    base_url: "https://www.amazon.com"
    auth:
      type: cookies
      domain: ".amazon.com"
      check:
        url: "https://www.amazon.com/gp/css/homepage.html"
        expect_status: 200
    label: Amazon Session
    help_url: https://www.amazon.com/ap/signin

# ═══════════════════════════════════════════════════════════════════════════════
# ADAPTERS
# ═══════════════════════════════════════════════════════════════════════════════

adapters:
  order:
    id: .order_id
    name: '("Order " + (.order_date // "Unknown") + " — " + (.total // ""))'
    text: '((.status // "") + " — " + ((.items // [])[:4] | map((.title | tostring | .[0:45])) | join(", ")) + (if ((.items // []) | length) > 4 then (", +" + (((.items // []) | length) - 4 | tostring) + " more") else "" end))'
    url: .url
    datePublished: .order_date
    data.total: .total
    data.total_amount: .total_amount
    data.item_count: .item_count
    data.status: .status
    data.delivery_date: .delivery_date
    data.shipping_address: .shipping_address
    data.tracking_url: .tracking_url
    data.summary: .summary

    contains:
      product[]:
        _source: '.items // []'
        id: .asin
        name: .title
        url: .url
        image: .image_url
        data.price: .price
        data.price_amount: .price_amount
        data.quantity: .quantity

  product:
    id: .asin
    name: .title
    text: .description
    url: .url
    image: .image_url
    author: .brand
    data.price: .price
    data.price_amount: .price_amount
    data.rating: .rating
    data.ratings_count: .ratings_count
    data.review_count: .review_count
    data.prime: .prime
    data.availability: .availability
    data.categories: .categories
    data.sponsored: .sponsored
    data.images: .images

  list:
    id: .list_id
    name: .name
    url: .url
    data.item_count: .item_count
    data.privacy: .privacy
    data.is_default: .is_default
    data.list_type: .list_type

    contains:
      product[]:
        _source: '.items // []'
        id: .asin
        name: .title
        url: .url
        image: .image_url
        author: .byline
        data.price: .price
        data.price_amount: .price_amount
        data.rating: .rating
        data.ratings_count: .ratings_count
        data.date_added: .date_added
        data.priority: .priority

  account:
    id: .customer_id
    name: .display
    issuer: .issuer
    data.marketplace_id: .marketplace_id
    data.is_prime: .is_prime

# ═══════════════════════════════════════════════════════════════════════════════
# OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════════

operations:

  # ─────────────────────────────────────────────────────────────────────────────
  # SEARCH SUGGESTIONS — completion.amazon.com public JSON API
  # ─────────────────────────────────────────────────────────────────────────────

  search_suggestions:
    description: >
      Get autocomplete keyword suggestions from Amazon's public completion API.
      Returns up to 10 keyword suggestions with ranking strategy metadata.
      Supports 21 marketplaces and 25+ department filters.
      Set personalized=true to use Amazon's p13n ranker instead of organic ranking.
    returns:
      suggestions: array
      count: integer
    connection: public
    params:
      query:
        type: string
        required: true
        description: "Search prefix (e.g. 'wireless head')"
      department:
        type: string
        description: "Department filter: all (default), electronics, books, sports, toys, fashion, grocery, beauty, automotive, garden, videogames, tools, baby, office, pets, music, appliances, kitchen, movies, software, health, jewelry, watches, shoes, industrial, arts, smart-home, kindle"
      personalized:
        type: boolean
        description: "Use personalized ranking (p13n-expert-pd-ops-ranker) instead of organic"
      marketplace:
        type: string
        description: "Country code: US (default), UK, DE, FR, JP, CA, AU, IN, ES, IT, MX, BR, NL, SE, SG, AE, SA, TR, BE, EG"
    python:
      module: ./amazon.py
      function: search_suggestions
      args:
        query: .params.query
        department: .params.department
        personalized: '.params.personalized // false'
        marketplace: .params.marketplace
      timeout: 15
    test:
      mode: read
      fixtures:
        query: "wireless headphones"

  # ─────────────────────────────────────────────────────────────────────────────
  # SEARCH PRODUCTS — HTML scraping of search result pages
  # ─────────────────────────────────────────────────────────────────────────────

  search_products:
    description: >
      Search Amazon products by keyword. Parses search result pages for product
      cards with ASIN, title, price, rating, review count, image, and Prime badge.
      May occasionally be blocked by Amazon's bot detection — use search_suggestions
      as a reliable fallback for keyword discovery.
    returns: product[]
    connection: public
    params:
      query:
        type: string
        required: true
        description: "Search query"
      department:
        type: string
        description: "Department filter (same values as search_suggestions)"
      page:
        type: integer
        default: 1
        description: "Results page number"
      marketplace:
        type: string
        description: "Country code (default: US)"
    python:
      module: ./amazon.py
      function: search_products
      args:
        query: .params.query
        department: .params.department
        page: '.params.page // 1'
        marketplace: .params.marketplace
      timeout: 30
    test:
      mode: read
      fixtures:
        query: "usb c cable"

  # ─────────────────────────────────────────────────────────────────────────────
  # GET PRODUCT — HTML + a-state parsing of product detail pages
  # ─────────────────────────────────────────────────────────────────────────────

  get_product:
    description: >
      Get detailed product information from an Amazon product page by ASIN.
      Extracts title, price, brand, rating, description, images, categories,
      and availability.
    returns: product
    connection: public
    params:
      asin:
        type: string
        required: true
        description: "Amazon ASIN (10-char alphanumeric, e.g. B0BQPNMXQV)"
      marketplace:
        type: string
        description: "Country code (default: US)"
    python:
      module: ./amazon.py
      function: get_product
      args:
        asin: .params.asin
        marketplace: .params.marketplace
      timeout: 30
    test:
      mode: read
      fixtures:
        asin: "B0BQPNMXQV"

  # ─────────────────────────────────────────────────────────────────────────────
  # ORDER HISTORY — authenticated, requires session cookies
  # ─────────────────────────────────────────────────────────────────────────────

  list_orders:
    description: >
      List Amazon orders with pagination. Returns 10 orders per page with totals,
      status, items, and pagination metadata (total_orders, has_next, total_pages).
    returns: order[]
    connection: web
    params:
      filter:
        type: string
        description: >
          Time filter: last30 (default), months-3, or year-YYYY (e.g. year-2024).
          Supports years back to 2006.
      page:
        type: integer
        default: 1
        description: "Page number (10 orders per page)"
    python:
      module: ./amazon.py
      function: list_orders
      params: true
      timeout: 30
    test:
      mode: write

  get_order:
    description: >
      Get full details for a specific Amazon order. Returns per-item prices,
      quantities, order summary (subtotal, shipping, tax, grand total),
      shipping address, delivery status, and tracking link.
    returns: order
    connection: web
    params:
      order_id:
        type: string
        required: true
        description: "Amazon order ID (e.g. 123-4567890-1234567)"
    python:
      module: ./amazon.py
      function: get_order
      params: true
      timeout: 30
    test:
      mode: write

  buy_again:
    description: >
      Get products Amazon recommends for repurchase based on order history.
      Shows frequently bought items and reorder suggestions.
    returns: product[]
    connection: web
    python:
      module: ./amazon.py
      function: buy_again
      params: true
      timeout: 30
    test:
      mode: write

  subscriptions:
    description: >
      List active Subscribe & Save subscriptions. Shows each subscription's
      product, delivery frequency, next delivery date, and upcoming scheduled
      deliveries with edit deadlines.
    returns:
      subscriptions: array
      subscription_count: integer
      upcoming_deliveries: array
      total_savings: string
    connection: web
    python:
      module: ./amazon.py
      function: subscriptions
      params: true
      timeout: 45
    test:
      mode: write

  # ─────────────────────────────────────────────────────────────────────────────
  # LISTS — authenticated, requires session cookies
  # ─────────────────────────────────────────────────────────────────────────────

  list_lists:
    description: >
      List all of the user's Amazon lists (wishlists, shopping lists, idea lists).
      Returns list names, item counts, privacy settings, and list IDs.
    returns: list[]
    connection: web
    python:
      module: ./amazon.py
      function: list_lists
      params: true
      timeout: 30
    test:
      mode: write

  get_list:
    description: >
      Get items from a specific Amazon list by list ID. Returns the list with
      nested products including ASIN, title, price, rating, date added, and priority.
      Supports token-based pagination — fetches all items by default.
    returns: list
    connection: web
    params:
      list_id:
        type: string
        required: true
        description: "Amazon list ID (e.g. OCYU5PINQ1B7)"
      filter:
        type: string
        description: "Item filter: unpurchased (default), purchased, all"
    python:
      module: ./amazon.py
      function: get_list
      params: true
      timeout: 60
    test:
      mode: write

  # ─────────────────────────────────────────────────────────────────────────────
  # SESSION — cookie-based auth check
  # ─────────────────────────────────────────────────────────────────────────────

  check_session:
    description: >
      Verify Amazon session cookies and identify the logged-in account.
      Returns display name, customer ID, session ID, and marketplace from the account page.
    connection: web
    returns: account
    python:
      module: ./amazon.py
      function: whoami
      params: true
      timeout: 30
    test:
      mode: write
