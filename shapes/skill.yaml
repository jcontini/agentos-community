# A connected service/integration in agentOS. Each skill provides tools
# and adapts external data into graph entities.
#
# Sources: agentOS engine (auto-registered from skill YAML files)
skill:
  plural: skills
  subtitle: description
  fields:
    skillId:          string    # unique identifier (e.g. "gmail", "github")
    description:       text
    color:             string    # hex color for UI display
    status:            string    # connected, disconnected, error
    error:             text      # error message if status is "error"
  relations:
    website:           website   # the service's homepage
    privacyPolicy:    webpage   # privacy policy page
    termsOfService:  webpage   # terms of service page
