# A purchasable offer — typically a flight itinerary with a price.
# An offer wraps one or more flights into a bookable unit.
#
# Sources: SerpAPI (Google Flights)
offer:
  fields:
    price:             number
    currency:          string    # ISO 4217 (e.g. USD, EUR)
    offerType:        string
    availability:      string
    validFrom:        datetime
    validUntil:       datetime
    bookingToken:     string    # opaque token for completing a booking
  relations:
    for:               product   # what this offer is selling
    offeredBy:        organization
    trips:             trip[]    # the trip(s) this offer books (flights: outbound + return)
