# A directed journey from origin to destination — one direction of travel.
# A round-trip booking produces two trips (outbound + return).
# A single Uber ride is one trip. A connecting flight is one trip with multiple legs.
# Multi-stop Uber rides have multiple legs (one per waypoint pair).
#
# Terminology alignment:
#   Duffel/NDC "slice" = trip    |  "segment" = leg
#   SerpAPI result = trip        |  flights[] element = leg
#   Schema.org Trip > subTrip    |  Uber ride = trip (1+ legs)
#   Train journey = trip         |  each train boarded = leg
#
# Sources: Uber (rides), Uber Eats (delivery), SerpAPI (flights)
trip:
  identity: [platform, id]
  subtitle: tripType
  fields:
    tripType:         string    # ride, flight, delivery, train, bus
    status:            string    # requested, accepted, in_progress, completed, cancelled
    departureTime:    datetime
    arrivalTime:      datetime
    duration:          string    # formatted ("19 minutes", "5h 23m")
    durationMinutes:  integer
    distance:          string    # formatted with unit ("4.04 miles", "1,420 km")
    vehicleType:      string    # UberX, Boeing 737, Acela, etc.
    cabinClass:       string    # economy, business, first (flights/trains)
    fare:              string    # formatted fare ("$24.50", "ZAR 303.00")
    fareAmount:       number    # numeric for math
    currency:          string    # ISO 4217
    rating:            string    # user's rating of the trip
    trackingUrl:      url       # live tracking link
    isSurge:          boolean   # surge/dynamic pricing (rides)
    isScheduled:      boolean   # pre-scheduled trip
    stops:             integer   # number of intermediate stops
    bookingToken:     string    # opaque token for booking (flights)
    carbonEmissions:  json      # CO2 estimate
  relations:
    origin:            place     # pickup / departure airport / departure station
    destination:       place     # dropoff / arrival airport / arrival station
    legs:              leg[]     # ordered sub-movements (1 for direct, 2+ for connections/multi-stop)
    carrier:           organization  # primary airline, transit agency
    driver:            person    # driver/courier (rides/delivery)
    order:             order     # the order this trip fulfills (delivery, ride booking)
