# A product analytics action — a single user interaction tracked by PostHog.
# NOT a life event — see event.yaml for births, marriages, etc.
#
# Sources: PostHog
analytics_event:
  plural: analytics_events
  fields:
    distinctId:       string    # PostHog user identifier
    properties:        json      # arbitrary event properties
    currentUrl:       url       # page URL where the action fired
  relations:
    person:            person
