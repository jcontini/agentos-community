# Something that happens — at a time, optionally at a place, involving people.
#
# The universal base for anything with a when: meetings, classes, parties,
# conferences, concerts, life events. Subtypes extend via `also: [event]`.
#
# Well-known fields (inherited): id, name, text, url, image, author, datePublished
# datePublished is when the event was *posted/announced* — NOT when it happens.
# Use start_date / end_date for the actual event timing.
#
# Sources: Apple Calendar, Partiful, Luma, Austin Boulder Project, future integrations
event:
  fields:
    event_type:        string    # open vocabulary — subtypes define their own values
    start_date:        datetime  # when the event starts (UTC preferred)
    end_date:          datetime  # when the event ends
    timezone:          string    # IANA timezone (e.g. America/Chicago) — for display + recurrence
    all_day:           boolean
    recurrence:        string    # iCal RRULE (e.g. FREQ=WEEKLY;BYDAY=MO)
  relations:
    involves:          person[]  # people this event involves (many-to-many)
    location:          place     # where it happens
    organizer:         person    # who organized/hosts it
  display:
    title: name
    subtitle: event_type
    date: start_date
    columns:
      - name:            Event
      - event_type:      Type
      - start_date:      Start
