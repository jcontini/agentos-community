# A product analytics event — a single user action tracked by PostHog.
# NOT a life event — see life_event.yaml for births, marriages, etc.
#
# Sources: PostHog
analytics_event:
  fields:
    distinct_id:       string    # PostHog user identifier
    properties:        json      # arbitrary event properties
    current_url:       url       # page URL where the event fired
  relations:
    person:            person
  display:
    title: name
    date: datePublished
    columns:
      - name:            Event
      - datePublished:   Time
      - distinct_id:     User
