# A tag or label — Gmail label, Todoist label, GitHub label, git tag, etc.
# Cross-skill: anything can carry tags. An email has labels, a task has tags,
# a PR has labels, a git commit has tags.
#
# Sources: Gmail, Todoist, GitHub, git
tag:
  plural: tags
  subtitle: tagType
  fields:
    color:             string    # hex color (#EA4335) or named color
    tagType:          string    # system, user — distinguishes built-in vs custom
    hash:              string    # commit hash the tag points to (git)
    annotated:         boolean   # true if annotated vs lightweight (git)
  relations:
    repository:        repository
