# A tag or label — git tag, Todoist label, etc.
#
# Sources: git, Todoist
tag:
  fields:
    color:             string
    hash:              string    # commit hash the tag points to
    annotated:         boolean   # true if annotated (vs lightweight)
  relations:
    repository:        repository
  display:
    title: name
    subtitle: text
    date: datePublished
    columns:
      - name:            Tag
      - datePublished:   Date
