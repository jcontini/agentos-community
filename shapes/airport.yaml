# An airport. Created from flight search results and linked to flights.
#
# Sources: SerpAPI (flight search)
airport:
  subtitle: iataCode
  fields:
    iataCode:         string    # 3-letter code (e.g. LAX, JFK, SFO)
    icaoCode:         string    # 4-letter code (e.g. KLAX, KJFK, KSFO)
    city:              string
    country:           string
    countryCode:      string    # ISO 3166-1 alpha-2 (e.g. US, GB)
    timezone:          string    # IANA timezone (e.g. America/Los_Angeles)
    elevationFt:      integer
    terminalCount:    integer
  relations:
    location:          place
    operator:          organization
