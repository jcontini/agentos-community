# A book. Books are also products, so they inherit price/brand/rating fields.
# User-specific fields (user_rating, date_read, shelf) come from the authenticated user's library.
#
# Sources: Goodreads
book:
  subtitle: author
  also: [product]     # a book is also a product
  fields:
    isbn:              string    # 10-digit ISBN
    isbn13:            string    # 13-digit ISBN
    pages:             integer
    genres:            string[]
    series:            string
    format:            string    # hardcover, paperback, ebook, audiobook
    language:          string
    originalTitle:    string    # title in original language if translated
    averageRating:    number
    ratingsCount:     integer
    reviewCount:      integer
    currentlyReadingCount: integer
    toReadCount:     integer
    places:            string[]  # settings/locations in the book
    characters:        string[]  # named characters
    awardsWon:        string[]
    workUrl:          url       # Goodreads canonical work URL
    userRating:       number    # authenticated user's rating
    dateRead:         datetime  # when the user finished it
    dateStarted:      datetime  # when the user started it
    dateAdded:        datetime  # when the user added it to a shelf
    shelf:             string    # user's shelf (read, to-read, currently-reading)
  relations:
    writtenBy:        author
    contributors:      author[]  # editors, translators, illustrators
    publisher:         organization
