# A podcast series. Contains episodes. Not the audio itself — that's on the episode.
#
# Sources: YouTube (some channels are podcasts), future podcast skill
podcast:
  fields:
    feed_url:          url       # RSS feed URL
  relations:
    host:              person[]
    platform:          product   # Spotify, Apple Podcasts, etc.
    episode:           episode[]
  display:
    title: name
    subtitle: author
    image: image
    columns:
      - name:            Podcast
      - author:          Host
