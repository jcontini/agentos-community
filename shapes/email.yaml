# An email message. Emails are also messages — querying by "message"
# returns emails alongside WhatsApp, iMessage, etc.
#
# Sources: Gmail, Mimestream
# RFC headers (message_id, in_reply_to, references) enable threading.
# Domain relations auto-extracted from sender/recipient addresses.
email:
  subtitle: author
  also: [message]     # an email is also a message
  fields:
    draftId:          string    # Gmail draft ID (present only for drafts)
    subject:           string    # email subject line
    messageId:        string    # RFC 2822 Message-ID header
    inReplyTo:       string    # RFC 2822 In-Reply-To header
    isUnread:         boolean
    isStarred:        boolean
    isDraft:          boolean
    isSent:           boolean   # true if sent by the user
    isTrash:          boolean
    isSpam:           boolean
    hasAttachments:   boolean
    labelIds:         string[]  # Gmail label IDs
    accountEmail:     string    # which account received this
    sizeEstimate:     integer   # bytes
    references:        string    # RFC 2822 References header chain
    replyTo:          string    # Reply-To header
    deliveredTo:      string    # Delivered-To header
    attachments:       json      # attachment metadata array (file-shaped objects)
    toRaw:            string    # raw To header (unparsed)
    ccRaw:            string    # raw Cc header (unparsed)
    bccRaw:           string    # raw Bcc header (unparsed)
    unsubscribe:       string    # List-Unsubscribe URL or mailto (RFC 2369)
    unsubscribeOneClick: boolean # true if RFC 8058 one-click POST works
    manageSubscription: string  # subscription preferences URL (from body or headers)
    listId:           string    # List-Id header (RFC 2919) — mailing list identifier
    isAutomated:      boolean   # true if Auto-Submitted header present (not "no")
    precedence:        string    # Precedence header: bulk, list, junk
    mailer:            string    # X-Mailer or User-Agent — what sent the email
    returnPath:       string    # Return-Path — envelope sender for bounces
    authResults:      string    # Authentication-Results: spf/dkim/dmarc verdicts
    feedbackId:       string    # Feedback-ID — Google campaign/sender tracking
    bodyHtml:         text      # HTML body (can be large)
  relations:
    from:              account   # sender
    to:                account[] # recipients
    cc:                account[] # cc recipients
    bcc:               account[] # bcc recipients
    domain:            domain    # sender's email domain
    toDomain:         domain[]  # recipient domains
    ccDomain:         domain[]  # cc domains
    tag:               tag[]     # labels (Gmail), categories, flags
