# A person's position at an organization (job title, board seat, etc.).
# Links a person to an organization with a time range.
#
# Sources: Apple Contacts, LinkedIn (via enrichment)
role:
  fields:
    title:             string
    role_type:         string    # employment, board, advisor, contractor, etc.
    start_date:        datetime
    end_date:          datetime
  relations:
    person:            person
    organization:      organization
  display:
    title: title
    subtitle: name
    date: start_date
    columns:
      - title:           Title
      - name:            Organization
      - start_date:      From
      - end_date:        To
