# A work item — issue, ticket, or to-do. Supports hierarchy (parent/children)
# and dependency tracking (blocked_by/blocks).
#
# Sources: Linear, Todoist, GitHub
task:
  fields:
    remote_id:         string    # source-specific ID (e.g. PROJ-123, #456)
    priority:          integer   # 1 = highest (normalized across sources)
    state:             string
    labels:            string[]
    started_at:        datetime
    target_date:       datetime  # due date
  relations:
    assigned_to:       person
    project:           project
    repository:        repository
    parent:            task
    children:          task[]
    blocked_by:        task[]
    blocks:            task[]
  display:
    title: name
    subtitle: state
    description: text
    date: datePublished
    columns:
      - name:            Task
      - state:           State
      - priority:        Priority
      - datePublished:   Created
