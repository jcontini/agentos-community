# A purchase order. Contains products and tracks delivery.
# Used for both e-commerce (Amazon) and delivery (Uber Eats) orders.
#
# Sources: Amazon, Uber Eats
order:
  fields:
    total:             string    # formatted total (e.g. "$42.99")
    total_amount:      number    # numeric total for math
    currency:          string
    status:            string    # draft, placed, confirmed, delivering, completed, cancelled
    delivery_date:     datetime  # actual or estimated delivery
    eta:               string    # estimated time range (e.g. "11:33-11:53 AM")
    subtotal:          number
    tip_amount:        number
    delivery_fee:      number
    taxes:             number
    summary:           string
    fare_breakdown:    json      # line items: [{label, amount, key}]
  relations:
    contains:          product[]
    shipping_address:  place
    store:             place         # store/restaurant LOCATION (place with feature_type: poi)
    tracking:          webpage       # carrier tracking page
  display:
    title: name
    date: datePublished
    columns:
      - name:            Order
      - status:          Status
      - total:           Total
      - delivery_date:   Delivery
