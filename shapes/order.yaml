# A purchase order. Contains products and tracks delivery.
# Used for both e-commerce (Amazon) and delivery (Uber Eats) orders.
#
# Sources: Amazon, Uber Eats
order:
  plural: orders
  identity: [platform, orderId]
  subtitle: total
  fields:
    orderId:           string    # platform order ID (e.g. "112-0527810-3136239")
    orderDate:        datetime  # when the order was placed
    total:             string    # formatted total (e.g. "$42.99")
    totalAmount:      number    # numeric total for math
    originalTotal:    string    # pre-discount total (before membership/promo savings)
    originalTotalAmount: number
    savings:           number    # total discount amount (membership + promotions)
    currency:          string
    status:            string    # draft, placed, confirmed, delivering, completed, cancelled
    deliveryDate:     datetime  # actual or estimated delivery
    eta:               string    # estimated time range (e.g. "11:33-11:53 AM")
    subtotal:          number
    tipAmount:        number
    deliveryFee:      number
    taxes:             number
    summary:           string
    fareBreakdown:    json      # line items: [{label, amount, key}]
  relations:
    platform:          platform    # which platform this order is from
    contains:          product[]
    shippingAddress:  place
    store:             place         # store/restaurant LOCATION (place with feature_type: poi)
    delivery:          trip          # delivery trip (Uber Eats: store → customer)
    tracking:          webpage       # carrier tracking page
