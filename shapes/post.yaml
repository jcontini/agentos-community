# A social media post — a Reddit submission, HN story, or similar.
# Reviews extend post via `also`. Engagement metrics are namespaced (engagement.*).
#
# Sources: Reddit, Hacker News
post:
  fields:
    external_url:      url       # linked URL (for link posts, not self-posts)
    post_type:         string    # story, comment, job, poll, etc.
    parent_id:         string    # parent post/comment ID for threaded replies
    replies:           json      # inline reply tree
    engagement.score:  integer   # upvotes/points
    engagement.comment_count: integer
    engagement.likes:  integer
  relations:
    posted_by:         account   # who posted it
    publish:           community # subreddit or group it was posted to
    replies_to:        post
    embed:             video     # embedded video (if any)
  display:
    title: name
    subtitle: author
    description: text
    date: datePublished
    columns:
      - name:            Title
      - author:          Author
      - engagement.score: Score
      - engagement.comment_count: Comments
      - datePublished:   Date
