# A piece of published content — a Reddit submission, HN story, YouTube upload,
# tweet, etc. Posts can contain media (videos, images, files). A comment is
# just a post that replies_to another post. Reviews extend post via `also`.
#
# Sources: Reddit, Hacker News, YouTube, Moltbook
post:
  fields:
    external_url:      url       # linked URL (for link posts)
    post_type:         string    # story, comment, job, poll, etc.
    score:         integer    # upvotes/points
    comment_count: integer
    likes:         integer
    view_count:    integer
    replies:       post[]     # nested comment tree (comments are posts)
  relations:
    posted_by:         account   # who posted it
    publish:           community # subreddit, group, or channel it was posted to
    replies_to:        post      # parent post (makes this a "comment")
    contains:          video[]   # embedded videos
    media:             image[]   # embedded images
    attachment:        file[]    # attached files
  display:
    title: name
    subtitle: author
    description: text
    date: datePublished
    columns:
      - name:            Title
      - author:          Author
      - score:         Score
      - comment_count: Comments
      - datePublished:   Date
