# A financial transaction — credit card charge, bank transfer, etc.
#
# Sources: Chase, Copilot Money
transaction:
  subtitle: category
  fields:
    amount:            number    # positive = credit, negative = debit
    currency:          string
    balance:           number    # account balance after this transaction
    category:          string    # spending category (e.g. "food", "travel")
    postingDate:      datetime  # when the bank posted it (vs. datePublished = transaction date)
    pending:           boolean
    recurring:         boolean
    notes:             string
    type:              string    # debit, credit, transfer, etc.
    details:           json
  relations:
    account:           account   # the financial account this posted to
