# A document — any human-readable text content with structure and authorship.
# Base type for reports, manuscripts, briefs, whitepapers, analyses.
# article, note, and webpage are siblings (not children) for now; they may
# gain also: [document] in a future migration once the shape stabilizes.
#
# Sources: filesystem, agent output, skill results
document:
  plural: documents
  subtitle: author
  also: [file]
  fields:
    contentType:      string    # markdown, html, pdf, plaintext, rst
    language:          string    # ISO 639-1 (e.g. en, es, ja)
    wordCount:        integer
    abstract:          text      # short summary of the document's contents
    tableOfContents: text      # section headings, one per line
  relations:
    author:            actor     # person or agent who produced this
    references:        document[]  # documents this document cites
    citedBy:          document[]  # documents that cite this one
