# A recurring pattern that produces instances when it fires.
#
# The universal recurrence primitive. Covers automation triggers (cron agents),
# transit timetables (bus every 15 min), service hours (Costco delivers Sat 9:30-7),
# and anything else that repeats and produces typed instances.
#
# NOT an event — events are things you attend (meetings, classes). A schedule is
# the *pattern* that produces things. Events have their own `recurrence` field
# for calendar display. When something is both (a recurring yoga class you book),
# the event models attendance and the schedule models availability.
#
# The `produces` relation links a schedule to what each occurrence creates:
# a trip (transport), an event (class/meeting), or nothing typed (just runs a prompt).
#
# Sources: Claude Code (cron agents), GTFS (transit), Uber Eats (store hours),
#          future: flight timetables, gym class schedules
schedule:
  plural: schedules
  subtitle: cronExpression
  fields:
    scheduleType:     string    # cron, interval, timetable, hours, one_shot
    cronExpression:   string    # 5-field cron (e.g. "0 9 * * *")
    rrule:             string    # iCal RRULE for complex recurrence (FREQ=WEEKLY;BYDAY=MO,WE,FR)
    hours:             json      # operating hours [{day, open, close}] — for store/service availability
    timezone:          string    # IANA timezone for evaluation
    prompt:            string    # what to do when it fires (automation triggers)
    enabled:           boolean
    durability:        string    # session, desktop, cloud — how resilient is it
    providerJobId:   string    # the provider's native ID (e.g. Claude Code's job ID)
    lastFiredAt:     datetime
    nextFireAt:      datetime
  relations:
    produces:          trip      # what each occurrence creates (transport schedules)
    provider:          skill     # which skill runs this (claude, launchd, etc.)
    operator:          organization  # who operates the service (airline, transit agency)
