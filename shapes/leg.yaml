# One continuous movement on a single vehicle — takeoff to landing,
# boarding to alighting, pickup to dropoff. No transfers within a leg.
#
# A nonstop flight is one leg. A connecting flight has one leg per segment.
# A direct Uber ride is one leg. A multi-stop Uber ride has one leg per stop pair.
#
# Sources: SerpAPI (flight segments), Uber (ride waypoints)
leg:
  subtitle: flightNumber
  fields:
    sequence:          integer   # 1-based order within the trip
    departureTime:    datetime
    arrivalTime:      datetime
    duration:          string    # formatted ("2h 15m", "19 minutes")
    durationMinutes:  integer
    flightNumber:     string    # e.g. "UA 1234" (flights only)
    cabinClass:       string    # economy, business, first
    vehicleType:      string    # aircraft model, car type, train name
    layoverMinutes:   integer   # wait time AFTER this leg before next leg
    carbonEmissions:  json      # CO2 estimate for this leg
    trace:             json      # GPS breadcrumbs: [{t, lat, lng, alt?, spd?, hdg?, acc?}, ...]
    tracePointCount: integer   # number of sample points
    polyline:          string    # Google encoded polyline (compact visual path, no timestamps)
  relations:
    origin:            place     # departure airport/station/address
    destination:       place     # arrival airport/station/address
    carrier:           organization  # airline or operator for this leg
    aircraft:          aircraft  # aircraft type (flights)
    trip:              trip      # parent trip
