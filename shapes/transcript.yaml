# A text transcript of audio/video content. Linked from meetings and videos.
#
# Sources: YouTube (auto-captions), Granola (meeting recordings)
transcript:
  fields:
    language:          string    # ISO 639-1 (e.g. "en", "es")
    source_type:       string    # meeting, video, podcast, etc.
    content_role:      string    # transcript, summary, notes
    duration_ms:       integer
    segment_count:     integer
    segments:          json      # timestamped text segments
  display:
    title: name
    description: content
    date: datePublished
    columns:
      - name:            Transcript
      - language:        Language
      - duration_ms:     Duration
      - source_type:     Source
