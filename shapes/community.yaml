# An online community — a subreddit, Facebook group, or similar.
#
# Sources: Reddit, Facebook
community:
  identity: [platform, id]
  subtitle: text
  fields:
    memberCount:      integer
    subscriberCount:  integer
    privacy:           string    # public, private, closed
    allowCrypto:      boolean   # subreddit-specific: allows cryptocurrency discussion
  relations:
    platform:          product
