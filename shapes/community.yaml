# An online community — a subreddit, Facebook group, or similar.
#
# Sources: Reddit, Facebook
community:
  fields:
    member_count:      integer
    subscriber_count:  integer
    privacy:           string    # public, private, closed
    allow_crypto:      boolean   # subreddit-specific: allows cryptocurrency discussion
  relations:
    platform:          product
  display:
    title: name
    subtitle: text
    image: image
    columns:
      - name:            Community
      - member_count:    Members
      - subscriber_count: Subscribers
      - privacy:         Privacy
