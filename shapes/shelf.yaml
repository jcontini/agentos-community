# A Goodreads bookshelf. Shelves are lists that contain books instead of generic products.
#
# Sources: Goodreads
shelf:
  also: [list]        # a shelf is also a list
  fields:
    isExclusive:      boolean   # true = a book can only be on one exclusive shelf (read, to-read, currently-reading)
  relations:
    contains:          book[]
