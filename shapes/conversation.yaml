# A message thread — an iMessage chat, WhatsApp group, email thread, etc.
# Contains messages and links to participants.
#
# Sources: iMessage, WhatsApp, Gmail
conversation:
  fields:
    is_group:          boolean
    is_archived:       boolean
    unread_count:      integer
    account_email:     string    # which account this conversation belongs to
  relations:
    platform:          product
    participant:       account[]
    message:           message[]
  display:
    title: name
    subtitle: text
    date: datePublished
    columns:
      - name:            Name
      - participant_count: Participants
      - datePublished:   Last Activity
      - unread_count:    Unread
