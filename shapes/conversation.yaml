# A message thread — an iMessage chat, WhatsApp group, email thread, etc.
# Contains messages and links to participants.
#
# Sources: iMessage, WhatsApp, Gmail
conversation:
  subtitle: text
  fields:
    isGroup:          boolean
    isArchived:       boolean
    unreadCount:      integer
    messageCount:     integer   # number of messages in the thread
    accountEmail:     string    # which account this conversation belongs to
    historyId:        string    # Gmail history ID for incremental sync
  relations:
    platform:          product
    participant:       account[]
    message:           message[]
