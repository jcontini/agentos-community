# A user's presence on a platform — their GitHub handle, Gmail address, etc.
# Created by most skills. Links a person to their platform-specific identity.
#
# Sources: GitHub, Gmail, WhatsApp, iMessage, Reddit, Hacker News, Chase, Copilot Money, PostHog
account:
  fields:
    handle:            string
    display_name:      string
    email:             string
    phone:             string
    bio:               text
    account_type:      string    # e.g. checking, savings, credit (financial); user, bot (social)
    color:             string
    karma:             integer   # platform reputation score (Reddit, HN)
    is_active:         boolean
    joined_date:       datetime
    last_active:       datetime
  relations:
    platform:          product   # the service this account lives on
    owner:             person    # the real person behind this account
    follows:           account[]
    followers:         account[]
  display:
    title: name
    subtitle: handle
    image: image
    columns:
      - name:            Name
      - handle:          Handle
      - email:           Email
