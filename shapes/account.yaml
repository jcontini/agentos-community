# A user's presence on a platform — their GitHub handle, Gmail address, etc.
# Created by most skills. Links a person to their platform-specific identity.
#
# Identity: [issuer, identifier] — one node per platform+handle combo.
# issuer = platform domain (e.g. "github.com", "gmail.com")
# identifier = platform-specific handle (e.g. "joecontini", "joe@adavia.com")
#
# Sources: GitHub, Gmail, WhatsApp, iMessage, Reddit, Hacker News, Chase, Copilot Money, PostHog
account:
  identity: [issuer, identifier]
  subtitle: identifier
  fields:
    issuer:            string    # platform domain: github.com, gmail.com, chase.com
    identifier:        string    # unique handle on that platform: username, email, user ID
    handle:            string    # display handle (may differ from identifier)
    displayName:      string
    email:             string
    phone:             string
    bio:               text
    accountType:      string    # e.g. checking, savings, credit (financial); user, bot (social)
    color:             string
    karma:             integer   # platform reputation score (Reddit, HN)
    isActive:         boolean
    joinedDate:       datetime
    lastActive:       datetime
    # Financial account fields (Chase, Copilot Money)
    accountId:        string    # platform account ID
    last4:            string    # last 4 digits
    balance:           number    # current balance
    available:         number    # available balance / credit
    creditLimit:      number
    minimumPayment:   number
    paymentDueDate:  datetime
    cardType:         string    # visa, mastercard, etc.
  relations:
    platform:          product   # the service this account lives on
    owner:             person    # the real person behind this account
    follows:           account[]
    followers:         account[]
