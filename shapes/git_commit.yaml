# A git commit — a single point in version control history.
#
# Sources: git skill
git_commit:
  fields:
    sha:               string    # full 40-char SHA hash
    message:           text      # commit message
    additions:         integer   # lines added
    deletions:         integer   # lines deleted
    files_changed:     integer
    committed_at:      datetime
  relations:
    author:            account   # who authored the commit
    committer:         account   # who committed (may differ from author)
    repository:        repository
    parent:            git_commit   # parent commit(s)
  display:
    title: name
    subtitle: author
    description: message
    date: committed_at
    columns:
      - name:            Commit
      - author:          Author
      - committed_at:    Date
      - files_changed:   Files
