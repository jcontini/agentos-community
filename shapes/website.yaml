# A published website (not a single page — see webpage for that).
# Websites are created/managed by the here.now publishing skill.
#
# Sources: here.now
website:
  subtitle: url
  fields:
    status:            string    # active, pending
    versionId:        string    # current deployment version
    expiresAt:        datetime  # when an anonymous site auto-expires
    anonymous:         boolean   # true if published without an account
    claimToken:       string    # token to claim an anonymous site
    claimUrl:         url
  relations:
    domain:            domain
    ownedBy:          organization
