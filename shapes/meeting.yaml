# A calendar meeting — an event with virtual meeting details and transcripts.
# Querying by "event" returns meetings too.
#
# Sources: Apple Calendar, Granola
meeting:
  also: [event]
  fields:
    calendar_link:     url
    is_virtual:        boolean
    meeting_url:       url       # Zoom/Meet/Teams link
  relations:
    transcribe:        transcript # meeting recording transcript
  display:
    title: name
    subtitle: location
    description: text
    date: start_date
    columns:
      - name:            Meeting
      - location:        Location
      - start_date:      Start
      - end_date:        End
