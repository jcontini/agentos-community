# A calendar meeting — an event with virtual meeting details and transcripts.
# Querying by "event" returns meetings too.
#
# Sources: Google Calendar, Apple Calendar, Granola
meeting:
  plural: meetings
  subtitle: location
  also: [event]
  fields:
    calendarLink:       url
    isVirtual:          boolean
    meetingUrl:         url       # Zoom/Meet/Teams link
    conferenceProvider: string    # "Google Meet", "Zoom", "Microsoft Teams"
    phoneDialIn:       string    # phone entry point URI (tel:+1-...)
  relations:
    transcribe:        transcript # meeting recording transcript
