# A real human. People are actors — they can own accounts, hold roles, attend meetings.
# Resolved from contacts, message senders, meeting attendees, etc.
#
# Sources: Apple Contacts, WhatsApp, PostHog, iMessage (inferred from handles)
person:
  subtitle: about
  also: [actor]       # a person is also an actor
  fields:
    firstName:        string
    lastName:         string
    middleName:       string
    nickname:          string
    birthday:          datetime
    notes:             text
    gender:            string
    about:             text
    joinedDate:       datetime  # when they joined a platform (partial OK: 2013-12)
    lastActive:       datetime  # when last seen active
  relations:
    accounts:          account[] # platform identities this person owns
    roles:             role[]    # positions at organizations
    location:          place
    website:           website
    favoriteBooks:    book[]    # books this person has marked as favorites
    currentlyReading: book[]    # books this person is currently reading
