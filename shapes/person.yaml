# A real human. People are actors — they can own accounts, hold roles, attend meetings.
# Resolved from contacts, message senders, meeting attendees, etc.
#
# Sources: Apple Contacts, WhatsApp, PostHog, iMessage (inferred from handles)
person:
  also: [actor]       # a person is also an actor
  fields:
    first_name:        string
    last_name:         string
    middle_name:       string
    nickname:          string
    birthday:          datetime
    notes:             text
    gender:            string
    about:             text
  relations:
    accounts:          account[] # platform identities this person owns
    roles:             role[]    # positions at organizations
    location:          place
    website:           website
  display:
    title: name
    subtitle: about
    image: image
    columns:
      - name:            Name
      - first_name:      First
      - last_name:       Last
      - birthday:        Birthday
