# A video. Currently YouTube-only. Related to channels, transcripts, and playlists.
#
# Sources: YouTube
video:
  fields:
    duration_ms:       integer
    resolution:        string    # e.g. "1080p", "4K"
    view_count:        integer
    like_count:        integer
    comment_count:     integer
  relations:
    posted_by:         account   # uploader's account
    upload:            channel   # channel this was uploaded to
    transcribe:        transcript
    embed:             post      # social media post embedding this video
    add_to:            playlist
  display:
    title: name
    subtitle: author
    image: image
    date: datePublished
    columns:
      - name:            Title
      - author:          Channel
      - view_count:      Views
      - like_count:      Likes
      - datePublished:   Published
