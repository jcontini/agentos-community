# A bounded interaction session — an MCP session, a coding session, a browsing
# session, a phone call. Has a start time, optional end time, and a participant.
#
# Sources: agentOS engine (MCP sessions), OpenCode, Claude
session:
  fields:
    session_type:      string    # mcp, coding, browsing, call, etc.
    started_at:        datetime
    ended_at:          datetime
    message_count:     integer   # messages exchanged in this session
    token_count:       integer   # tokens used (for AI sessions)
  relations:
    participant:       actor     # who was in this session (person, agent)
    project:           project   # what was being worked on
    folder:            folder    # working directory (for coding sessions)
  display:
    title: name
    subtitle: session_type
    date: started_at
    columns:
      - name:            Session
      - session_type:    Type
      - started_at:      Started
      - ended_at:        Ended
