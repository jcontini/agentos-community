# An MCP session — a client connected, made some calls, disconnected.
# One node per unique client+project+branch combo, updated on reconnection.
#
# Sources: agentOS engine (MCP session registration)
session:
  plural: sessions
  identity: [client, projectId, gitBranch]
  subtitle: client
  icon: terminal
  fields:
    client:           string    # claude-code, agentos-call, cursor, opencode
    projectId:        string    # org/repo or folder name
    gitBranch:        string
    sessionType:      string    # mcp, http, cli
    startedAt:        datetime
    endedAt:          datetime
    messageCount:     integer
    tokenCount:       integer
  relations:
    participant:       actor
    folder:            folder
