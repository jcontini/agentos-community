# A commercial airline. Created from flight search results.
#
# Sources: SerpAPI (flight search)
airline:
  plural: airlines
  identity: iataCode
  subtitle: iataCode
  also: [organization]  # an airline is also an organization
  fields:
    iataCode:         string    # 2-letter code (e.g. UA, DL, AA)
    icaoCode:         string    # 3-letter code (e.g. UAL, DAL, AAL)
    callsign:          string    # radio callsign (e.g. "UNITED", "DELTA")
    country:           string
    alliance:          string    # e.g. Star Alliance, oneworld, SkyTeam
