# A company, nonprofit, or other organization. Organizations are actors — they
# can be attributed as "who" in the graph alongside people and agents.
#
# Sources: extracted from various skills (email domains, product manufacturers, etc.)
organization:
  subtitle: industry
  also: [actor]       # an organization is also an actor
  fields:
    industry:          string
    employeeCount:    integer
    founded:           datetime
  relations:
    member:            person[]
    domain:            domain
    website:           website
    headquarters:      place
