# A web search result. Results are also webpages, so they carry URL/title/content.
#
# Sources: Brave Search, Exa
result:
  also: [webpage]     # a search result is also a webpage
  fields:
    indexed_at:        datetime  # when the search engine last crawled this page
    result_type:       string
  display:
    title: name
    subtitle: url
    description: text
    image: image
    date: datePublished
    columns:
      - name:            Title
      - url:             URL
      - datePublished:   Date
