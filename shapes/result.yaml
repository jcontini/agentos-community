# A search result — a pointer to something found. Not the thing itself.
# A search might return webpages, products, people, articles — anything.
# The result just carries search-specific metadata (when indexed, what type).
#
# Sources: Brave Search, Exa, Moltbook
result:
  fields:
    indexed_at:        datetime  # when the search engine last crawled this
    result_type:       string    # web, image, video, news, etc.
  display:
    title: name
    subtitle: url
    description: text
    image: image
    date: datePublished
    columns:
      - name:            Title
      - url:             URL
      - datePublished:   Date
