# A generic collection of items. Base type for shelf (books) and playlist (videos).
#
# Sources: Goodreads (via shelf), YouTube (via playlist)
list:
  fields:
    privacy:           string
    list_type:         string
    is_default:        boolean   # platform-created list (e.g. "Watch Later")
    is_public:         boolean
  relations:
    platform:          product
    belongs_to:        account   # who owns this list
    contains:          product[]
  display:
    title: name
    date: datePublished
    columns:
      - name:            Name
      - list_type:       Type
