# A generic collection of items. Base type for shelf (books) and playlist (videos).
#
# Sources: Goodreads (via shelf), YouTube (via playlist)
list:
  identity: [platform, id]
  fields:
    listId:           string    # platform list ID (may differ from graph id)
    privacy:           string
    listType:         string
    isDefault:        boolean   # platform-created list (e.g. "Watch Later")
    isPublic:         boolean
    itemCount:        integer
    items:             json      # nested item data (TODO: extract as contains relation)
  relations:
    platform:          product
    belongsTo:        account   # who owns this list
    contains:          product[]
