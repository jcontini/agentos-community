# A generic collection of items. Base type for shelf (books) and playlist (videos).
#
# Sources: Goodreads (via shelf), YouTube (via playlist)
list:
  fields:
    privacy:           string
    listType:         string
    isDefault:        boolean   # platform-created list (e.g. "Watch Later")
    isPublic:         boolean
  relations:
    platform:          product
    belongsTo:        account   # who owns this list
    contains:          product[]
