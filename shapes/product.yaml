# A purchasable item. Base type for book and aircraft.
# Amazon-specific fields (prime, sponsored) are present because Amazon is the primary source.
#
# Sources: Amazon
product:
  fields:
    price:             string    # formatted price (e.g. "$29.99") — current/discounted price
    price_amount:      number    # numeric price for math
    original_price:    string    # pre-discount price (e.g. "$10.99" before Uber One / Prime / sale)
    original_price_amount: number
    currency:          string
    rating:            number
    ratings_count:     integer
    review_count:      integer
    categories:        string[]
    availability:      string
    prime:             boolean   # Amazon Prime eligible
    sponsored:         boolean   # paid placement
    images:            json
    quantity:          integer
  relations:
    brand:             brand
    manufacturer:      organization
  display:
    title: name
    subtitle: author
    description: text
    image: image
    date: datePublished
    columns:
      - name:            Name
      - brand:           Brand
      - price:           Price
      - rating:          Rating
      - ratings_count:   Reviews
      - availability:    Available
