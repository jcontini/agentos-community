# A purchasable item. Base type for book and aircraft.
# Cross-skill: Amazon products, Uber Eats grocery items, any retail catalog.
#
# Sources: Amazon, Uber Eats (grocery), Open Food Facts (enrichment)
product:
  fields:
    price:             string    # formatted price (e.g. "$29.99") — current/discounted price
    price_amount:      number    # numeric price for math
    original_price:    string    # pre-discount price (e.g. "$10.99" before Uber One / Prime / sale)
    original_price_amount: number
    currency:          string
    rating:            number
    ratings_count:     integer
    review_count:      integer
    categories:        string[]
    availability:      string
    prime:             boolean   # Amazon Prime eligible
    sponsored:         boolean   # paid placement
    images:            json
    quantity:          integer
    # Physical / grocery
    weight:            string    # formatted weight/size ("12 oz", "3 lbs", "500ml")
    weight_value:      number    # numeric weight for math
    weight_unit:       string    # oz, lb, kg, g, ml, L, ct, etc.
    sold_by_weight:    boolean   # true if priced per-lb/kg (vs per-unit)
    department:        string    # top-level grocery department ("Produce", "Dairy", "Bakery")
    aisle:             string    # store aisle/section ("Fresh Fruits", "Organic Dairy")
    sku:               string    # retailer SKU / catalog UUID
    barcode:           string    # UPC/EAN barcode (from Open Food Facts)
    # Nutrition (populated via Open Food Facts enrichment)
    nutrition_score:   string    # Nutri-Score A-E
    nova_group:        integer   # NOVA 1-4 ultra-processing level
    calories:          number    # per serving
    serving_size:      string    # "1 cup (240ml)"
  relations:
    brand:             brand
    manufacturer:      organization
    tagged:            tag[]     # dietary (VEGAN), allergens, certifications (Organic), departments
  display:
    title: name
    subtitle: brand
    description: text
    image: image
    date: datePublished
    columns:
      - name:            Name
      - brand:           Brand
      - price:           Price
      - weight:          Size
      - department:      Dept
      - availability:    Available
