# A source code repository.
#
# Sources: GitHub
repository:
  fields:
    stars:             integer
    forks:             integer
    language:          string    # primary language
    topics:            string[]
    open_issues:       integer
    is_archived:       boolean
    is_private:        boolean
    default_branch:    string
    license:           string    # SPDX identifier (e.g. MIT, Apache-2.0)
    size:              integer   # repo size in KB
  relations:
    forked_from:       repository  # source repo this was forked from
    owner:             account
  display:
    title: name
    subtitle: language
    description: text
    date: datePublished
    columns:
      - name:            Name
      - language:        Language
      - stars:           Stars
      - forks:           Forks
