# A source code repository.
#
# Sources: GitHub
repository:
  plural: repositories
  identity_any: [path, url]
  subtitle: language
  fields:
    stars:             integer
    forks:             integer
    language:          string    # primary language
    topics:            string[]
    openIssues:       integer
    isArchived:       boolean
    isPrivate:        boolean
    defaultBranch:    string
    license:           string    # SPDX identifier (e.g. MIT, Apache-2.0)
    size:              integer   # repo size in KB
  relations:
    forkedFrom:       repository  # source repo this was forked from
    owner:             account
