# A single message in a conversation. Base type — email extends this via `also`.
# Querying by "message" returns emails alongside iMessages, WhatsApp messages, etc.
#
# Sources: iMessage, WhatsApp; extended by email (Gmail, Mimestream)
message:
  subtitle: author
  fields:
    conversationId:   string
    isOutgoing:       boolean   # true if sent by the user
    isStarred:        boolean   # user-flagged as important
  relations:
    platform:          product
    from:              account   # sender
    inConversation:   conversation
    repliesTo:        message
