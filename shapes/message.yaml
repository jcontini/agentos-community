# A single message in a conversation. Base type — email extends this via `also`.
# Querying by "message" returns emails alongside iMessages, WhatsApp messages, etc.
#
# Sources: iMessage, WhatsApp; extended by email (Gmail, Mimestream)
message:
  fields:
    conversation_id:   string
    is_outgoing:       boolean   # true if sent by the user
    is_starred:        boolean   # user-flagged as important
  relations:
    platform:          product
    from:              account   # sender
    in_conversation:   conversation
    replies_to:        message
  display:
    title: name
    subtitle: author
    description: content
    date: datePublished
    columns:
      - name:            Name
      - author:          From
      - datePublished:   Date
      - is_outgoing:     Sent
