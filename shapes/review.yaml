# A user review of a product. Reviews are also posts, so they carry engagement metrics.
#
# Sources: Goodreads, Amazon
review:
  subtitle: author
  also: [post]        # a review is also a post
  fields:
    rating:            number
    ratingMax:        number    # scale upper bound (e.g. 5, 10, 100)
    tags:              string[]
    isVerified:       boolean   # verified purchase
  relations:
    reviews:           product   # what this review is about
    postedBy:         account
