# An AI agent that acts on behalf of a user. Agents are actors — they
# can be attributed as the "who" on any change in the graph, alongside
# people and organizations.
#
# Examples: Claude in Cursor, a background job agent, a scheduled task runner.
agent:
  subtitle: model
  also: [actor]       # an agent is also an actor (like person, organization)
  fields:
    model:             string    # model identifier (e.g. "claude-sonnet-4-5", "gpt-4o")
    provider:          string    # who runs the model (e.g. "anthropic", "openai")
    sessionId:        string    # groups related requests from this agent
