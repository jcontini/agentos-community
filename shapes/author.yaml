# A book author on Goodreads. Separate from person — this is a Goodreads-specific
# profile with ratings and follower counts.
#
# Sources: Goodreads
author:
  subtitle: location
  fields:
    location:          string
    averageRating:    number    # Goodreads average across all works
    worksCount:       integer
    birthDate:        string
    website:           url
    twitter:           string    # Twitter/X handle
    memberSince:      datetime  # Goodreads join date
    followersCount:   integer
  relations:
    books:             book[]
