# A report — structured output from a research task, analysis, or agent run.
# Reports are first-class graph entities: they link to what was studied
# (subject), who commissioned the work (commissioned_by), and which specs
# the findings inform (related_specs).
#
# report_type drives how the UI surfaces the entity:
#   research    — open-ended exploration, summarizes what was found
#   analysis    — systematic breakdown of a specific artifact or dataset
#   comparison  — side-by-side evaluation of multiple options
#   audit       — compliance or quality check against known criteria
#   review      — qualitative assessment (code review, skill review, etc.)
#
# Sources: agent output (claude-code, cursor), skill runs, manual creation
report:
  plural: reports
  subtitle: reportType
  also: [document]
  fields:
    reportType:       string    # research, analysis, comparison, audit, review
    methodology:       text      # how the research/analysis was conducted
    findings:          text      # what was discovered (primary output)
    recommendations:   text      # what to do next, if applicable
    confidence:        number    # 0.0–1.0 — agent's self-assessed reliability
    dataSources:      string[]  # URLs, file paths, tool names used as inputs
    subjectId:        string    # node ID of the entity this report is about
  relations:
    commissionedBy:   actor     # person or agent that requested this report
    relatedSpecs:     spec[]    # specs this report informs or was written for
