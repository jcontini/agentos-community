# A currently loaded/running AI model instance.
#
# Sources: Ollama
loaded_model:
  fields:
    size:              string    # memory footprint
    quantization:      string
    expires_at:        datetime
    vram_usage:        string
    size_vram:         integer   # VRAM bytes used by this model
    digest:            string    # content-addressable hash
  display:
    title: name
    subtitle: size
    columns:
      - name:            Model
      - size:            Size
      - quantization:    Quantization
