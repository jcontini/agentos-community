name: Deploy Book

on:
  push:
    branches: [main]
    paths: [docs/**, book.toml, .github/workflows/book.yml]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jontze/action-mdbook@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book
      - id: deployment
        uses: actions/deploy-pages@v4
